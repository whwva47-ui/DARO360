<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d4a2f">
<title>DARO360 - Jitihada Senior School</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gd:#0d4a2f;--gm:#155e3a;--gl:#1e7a4a;--gp:#e8f5ee;--gold:#c8952a;--goldf:#f0b429;--white:#ffffff;--off:#f7faf8;--text:#1a2e22;--muted:#5a7a65;--border:#d0e4d8;--card:#ffffff;--red:#c0392b;--redbg:#fdf2f2;--amber:#d97706;--amberbg:#fffbeb;--blue:#1d6fa4;--bluebg:#eff6ff;--r:10px;--sidebar:220px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;color:var(--text);background:var(--off);}
#login-screen{position:fixed;inset:0;z-index:1000;background:var(--gd);display:flex;align-items:center;justify-content:center;flex-direction:column;}
.login-card{background:var(--white);border-radius:16px;padding:40px 36px;width:min(420px,92vw);box-shadow:0 24px 64px rgba(0,0,0,0.3);}
.login-logo{font-family:'Libre Baskerville',serif;font-size:1.8rem;font-weight:700;color:var(--gd);margin-bottom:4px;}
.login-logo span{color:var(--gold);}
.login-school{font-size:0.78rem;color:var(--muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:28px;}
.login-label{font-size:0.72rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.login-select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.95rem;color:var(--text);background:var(--off);margin-bottom:16px;appearance:none;}
.login-select:focus{outline:none;border-color:var(--gl);}
.login-btn{width:100%;padding:13px;background:var(--gd);color:var(--white);border:none;border-radius:8px;font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:var(--gm);}
.pin-row{display:none;gap:8px;margin-bottom:16px;}
.pin-row input{flex:1;padding:11px;text-align:center;font-size:1.2rem;font-weight:700;border:1px solid var(--border);border-radius:8px;font-family:inherit;background:var(--off);color:var(--text);}
.pin-hint{font-size:0.75rem;color:var(--muted);margin-bottom:12px;display:none;}
#app{display:none;height:100vh;flex-direction:row;}
#app.visible{display:flex;}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--gd);display:flex;flex-direction:column;overflow-y:auto;border-right:3px solid var(--gold);}
.sidebar-logo{padding:20px 18px 16px;font-family:'Libre Baskerville',serif;font-size:1.2rem;font-weight:700;color:var(--white);border-bottom:1px solid rgba(255,255,255,0.1);}
.sidebar-logo span{color:var(--goldf);}
.sidebar-school{font-size:0.62rem;color:rgba(255,255,255,0.45);font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
.sidebar-user{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:0.78rem;color:rgba(255,255,255,0.6);}
.sidebar-user strong{display:block;color:var(--white);font-size:0.85rem;margin-bottom:1px;}
.sidebar-nav{flex:1;padding:10px 0;}
.nav-section{padding:8px 18px 4px;font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:0.85rem;font-weight:500;color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:var(--white);}
.nav-item.active{background:rgba(255,255,255,0.1);color:var(--white);border-left-color:var(--goldf);}
.nav-icon{font-size:1rem;width:18px;text-align:center;flex-shrink:0;}
.sidebar-logout{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.82rem;color:rgba(255,255,255,0.45);cursor:pointer;display:flex;align-items:center;gap:8px;}
.sidebar-logout:hover{color:rgba(255,255,255,0.8);}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{padding:14px 24px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;color:var(--gd);}
.topbar-date{font-size:0.78rem;color:var(--muted);}
.content{padding:24px;flex:1;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px;}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.card-title{font-family:'Libre Baskerville',serif;font-size:0.95rem;font-weight:700;color:var(--gd);margin-bottom:14px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;border-left:4px solid var(--gl);}
.stat-num{font-family:'Libre Baskerville',serif;font-size:2rem;font-weight:700;color:var(--gd);line-height:1;}
.stat-label{font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:0.04em;}
.bg{background:rgba(30,122,74,0.1);color:var(--gl);border:1px solid rgba(30,122,74,0.2);}
.ba{background:var(--amberbg);color:var(--amber);border:1px solid rgba(217,119,6,0.2);}
.br{background:var(--redbg);color:var(--red);border:1px solid rgba(192,57,43,0.2);}
.bb{background:var(--bluebg);color:var(--blue);border:1px solid rgba(29,111,164,0.2);}
.bgr{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:0.7rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);}
.fi,.fs,.ft{padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:0.88rem;color:var(--text);background:var(--off);transition:border-color 0.2s;width:100%;}
.fs{appearance:none;}
.ft{resize:vertical;min-height:80px;}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--gl);box-shadow:0 0 0 3px rgba(30,122,74,0.1);}
.btn{padding:9px 20px;border-radius:7px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:7px;}
.btn-p{background:var(--gd);color:var(--white);}
.btn-p:hover{background:var(--gm);}
.btn-s{background:transparent;color:var(--gd);border:1px solid var(--gd);}
.btn-s:hover{background:var(--gp);}
.btn-d{background:var(--red);color:var(--white);}
.btn-d:hover{background:#a93226;}
.btn-g{background:var(--gold);color:var(--white);}
.btn-g:hover{background:var(--goldf);color:var(--gd);}
.btn-sm{padding:5px 12px;font-size:0.78rem;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.85rem;}
th{text-align:left;padding:9px 12px;font-size:0.7rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);background:var(--off);border-bottom:2px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--gp);}
.reg-student{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap;}
.reg-student:last-child{border-bottom:none;}
.reg-name{font-weight:600;font-size:0.88rem;min-width:150px;}
.reg-adm{font-size:0.75rem;color:var(--muted);}
.reg-actions{display:flex;gap:6px;flex-wrap:wrap;}
.rb{padding:5px 12px;border-radius:5px;font-size:0.75rem;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.rb-p{background:rgba(30,122,74,0.1);color:var(--gl);border-color:rgba(30,122,74,0.25);}
.rb-p.on{background:var(--gl);color:var(--white);border-color:var(--gl);}
.rb-a{background:var(--redbg);color:var(--red);border-color:rgba(192,57,43,0.2);}
.rb-a.on{background:var(--red);color:var(--white);border-color:var(--red);}
.rb-l{background:var(--amberbg);color:var(--amber);border-color:rgba(217,119,6,0.2);}
.rb-l.on{background:var(--amber);color:var(--white);border-color:var(--amber);}
.rec{padding:14px 16px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;border-left:4px solid var(--gl);}
.rec.ser{border-left-color:var(--red);}
.rec.mod{border-left-color:var(--amber);}
.rec-meta{font-size:0.75rem;color:var(--muted);margin-bottom:4px;display:flex;gap:12px;flex-wrap:wrap;}
.rec-text{font-size:0.88rem;color:var(--text);line-height:1.55;}
.sugg{padding:14px 16px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
.sugg-meta{font-size:0.72rem;color:var(--muted);margin-bottom:6px;}
.sugg-text{font-size:0.88rem;color:var(--text);font-style:italic;}
.aio{background:var(--off);border:1px solid var(--border);border-radius:8px;padding:18px;margin-top:14px;display:none;}
.aio.vis{display:block;}
.aio-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.aio-hdr h4{font-family:'Libre Baskerville',serif;font-size:0.9rem;font-weight:700;color:var(--gd);}
.ai-text{font-size:0.83rem;line-height:1.8;white-space:pre-wrap;color:var(--text);}
.csc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:8px;}
.cls-name{font-weight:700;font-size:0.9rem;color:var(--gd);}
.cls-tchr{font-size:0.75rem;color:var(--muted);}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:0;overflow-x:auto;}
.tab{padding:10px 18px;font-size:0.85rem;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.15s;}
.tab.active{color:var(--gd);border-bottom-color:var(--gd);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.empty p{font-size:0.88rem;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:var(--white);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gd);color:#fff;padding:10px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity 0.3s;opacity:0;pointer-events:none;}
.toast.show{opacity:1;}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--gd);font-size:1.3rem;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:190;}
.overlay.vis{display:block;}
@media(max-width:700px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:200;transition:left 0.25s;height:100vh;}
  .sidebar.open{left:0;}
  .hamburger{display:block;}
  .content{padding:14px;}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">DARO<span>360</span></div>
    <div class="login-school">Jitihada Senior School</div>
    <label class="login-label">Sign in as</label>
    <select class="login-select" id="login-role" onchange="roleChanged()">
      <option value="">-- Select your role --</option>
      <option value="tf">Felix Ochieng -- English &amp; Literature (Grade 10)</option>
      <option value="tg">Grace Wanjiku -- Mathematics (Grade 10)</option>
      <option value="tj">James Mutua -- Biology (Form 3 &amp; 4)</option>
      <option value="tm">Mary Akinyi -- History (Form 3 &amp; 4)</option>
      <option value="td">Duty Teacher -- On Duty Today</option>
      <option value="admin">Administrator / Principal</option>
      <option value="student">Learner -- Anonymous Access</option>
    </select>
    <div class="pin-row" id="pin-row">
      <input type="password" maxlength="1" id="p1" placeholder="*" oninput="pnxt(this,'p2')">
      <input type="password" maxlength="1" id="p2" placeholder="*" oninput="pnxt(this,'p3')">
      <input type="password" maxlength="1" id="p3" placeholder="*" oninput="pnxt(this,'p4')">
      <input type="password" maxlength="1" id="p4" placeholder="*" oninput="pnxt(this,null)">
    </div>
    <div class="pin-hint" id="pin-hint">Demo PIN: 1 2 3 4</div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="toast" class="toast"></div>
<div class="overlay" id="overlay" onclick="closeSB()"></div>

<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">DARO<span>360</span><div class="sidebar-school">Jitihada Senior School</div></div>
    <div class="sidebar-user"><strong id="sb-name">--</strong><span id="sb-role">--</span></div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-logout" onclick="doLogout()">Sign out</div>
  </div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="openSB()">&#9776;</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
      </div>
      <div class="topbar-date" id="top-date"></div>
    </div>
    <div class="content" id="mc"></div>
  </div>
</div>

<script>
var CU = null;
var USERS = {
  tf: {name:'Felix Ochieng', role:'teacher', title:'Teacher - English & Literature', subjects:['English Language','Literature in English'], classes:['10E','10W'], cur:'cbc'},
  tg: {name:'Grace Wanjiku', role:'teacher', title:'Teacher - Mathematics', subjects:['Mathematics'], classes:['10E','10W'], cur:'cbc'},
  tj: {name:'James Mutua', role:'teacher', title:'Teacher - Biology', subjects:['Biology'], classes:['F3','F4'], cur:'844'},
  tm: {name:'Mary Akinyi', role:'teacher', title:'Teacher - History', subjects:['History & Government'], classes:['F3','F4'], cur:'844'},
  td: {name:'Duty Teacher', role:'duty', title:'Duty Teacher', subjects:[], classes:[]},
  admin: {name:'Principal Kamau', role:'admin', title:'Principal / Administrator', subjects:[], classes:[]},
  student: {name:'Anonymous Learner', role:'student', title:'Learner Access', subjects:[], classes:[]}
};

var STRANDS = {
  'English Language': ['Listening and Speaking','Reading','Writing','Language Use'],
  'Literature in English': ['Oral Literature','Poetry','Prose Fiction','Drama','Essay Writing'],
  'Mathematics': ['Numbers','Algebra','Geometry','Measurement','Statistics'],
  'Biology': ['Cell Biology','Ecology','Genetics','Human Physiology','Reproduction'],
  'History & Government': ['Pre-Colonial Africa','Colonial Period','Post-Independence','Civic Education','EAC']
};

var NAV = {
  teacher: [
    {sec:'Teaching'},
    {id:'dashboard', ic:'D', lbl:'Dashboard'},
    {id:'register',  ic:'R', lbl:'Class Register'},
    {id:'lessonplan',ic:'L', lbl:'Lesson Plans'},
    {id:'scheme',    ic:'S', lbl:'Scheme of Work'},
    {sec:'Records'},
    {id:'discipline',ic:'!', lbl:'Discipline'},
    {id:'occurrence',ic:'O', lbl:'Occurrence Book'}
  ],
  duty: [
    {sec:'Duty'},
    {id:'dashboard',  ic:'D', lbl:'Dashboard'},
    {id:'occurrence', ic:'O', lbl:'Occurrence Book'},
    {id:'discipline', ic:'!', lbl:'Discipline'}
  ],
  admin: [
    {sec:'School'},
    {id:'dashboard',      ic:'D', lbl:'Dashboard'},
    {id:'admin-register', ic:'R', lbl:'Register Monitor'},
    {id:'admin-classes',  ic:'C', lbl:'Classes'},
    {sec:'Records'},
    {id:'discipline', ic:'!', lbl:'Discipline'},
    {id:'occurrence', ic:'O', lbl:'Occurrence Book'},
    {id:'suggestions',ic:'I', lbl:'Suggestions'}
  ],
  student: [
    {sec:'Learner'},
    {id:'dashboard',  ic:'H', lbl:'Home'},
    {id:'suggestions',ic:'I', lbl:'Suggestion Box'}
  ]
};

// -- DB --
function dbg(k){ try{ return JSON.parse(localStorage.getItem('d360_'+k)||'null'); } catch(e){ return null; } }
function dbs(k,v){ localStorage.setItem('d360_'+k, JSON.stringify(v)); }
function dbp(k,item){ var a=dbg(k)||[]; a.push(item); dbs(k,a); return a; }

function initDB(){
  if(!dbg('s10E')) dbs('s10E', mkStudents('10E',32));
  if(!dbg('s10W')) dbs('s10W', mkStudents('10W',30));
  if(!dbg('sF3'))  dbs('sF3',  mkStudents('F3',38));
  if(!dbg('sF4'))  dbs('sF4',  mkStudents('F4',35));
  if(!dbg('regs')) dbs('regs', {});
  if(!dbg('disc')) dbs('disc', []);
  if(!dbg('occs')) dbs('occs', []);
  if(!dbg('sugg')) dbs('sugg', []);
}

function mkStudents(cls, n){
  var fn=['Amina','Brian','Catherine','David','Esther','Felix','Grace','Hassan','Irene','Joseph','Kelvin','Lydia','Martin','Nancy','Oliver','Patricia','Ruth','Samuel','Teresa','Umar','Vivian','William','Alice','Bernard','Caroline','Dennis','Eunice','Fredrick','George','Helen','Ivan','Janet'];
  var sn=['Omondi','Wanjiku','Mutua','Akinyi','Kimani','Otieno','Njoroge','Kamau','Mwangi','Owino','Karanja','Nyambura','Odhiambo','Kiptoo','Wangari','Gitau','Macharia','Ochieng','Waweru','Kipchoge','Mureithi','Adhiambo','Mugo','Nekesa','Rotich','Simiyu'];
  var s=[];
  for(var i=0;i<n;i++){
    s.push({id:cls+pad(i+1), adm:'JSS/'+cls+'/'+(2024+Math.floor(i/10))+'/'+pad(i+1), name:fn[i%fn.length]+' '+sn[(i+3)%sn.length], gender:i%3===0?'M':'F'});
  }
  return s;
}
function pad(n){ return n<10?'0'+n:''+n; }
function tdkey(){ return new Date().toISOString().slice(0,10); }
function clslbl(c){ var m={E:'Grade 10 East',W:'Grade 10 West',F3:'Form 3',F4:'Form 4','10E':'Grade 10 East','10W':'Grade 10 West'}; return m[c]||c; }
function greet(){ var h=new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening'; }

// -- LOGIN --
function roleChanged(){
  var v=document.getElementById('login-role').value;
  var pr=document.getElementById('pin-row');
  var ph=document.getElementById('pin-hint');
  if(v && v!=='student'){ pr.style.display='flex'; ph.style.display='block'; }
  else { pr.style.display='none'; ph.style.display='none'; }
}

function pnxt(el, nid){
  if(el.value.length===1 && nid) document.getElementById(nid).focus();
}

function doLogin(){
  var role=document.getElementById('login-role').value;
  if(!role){ alert('Please select your role.'); return; }
  if(role!=='student'){
    var pin=[1,2,3,4].map(function(i){ return document.getElementById('p'+i).value; }).join('');
    if(pin!=='1234'){ alert('Wrong PIN. Demo PIN is 1234.'); return; }
  }
  CU=USERS[role]; CU.key=role;
  initDB();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('sb-name').textContent=CU.name;
  document.getElementById('sb-role').textContent=CU.title;
  document.getElementById('top-date').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  buildNav();
  go('dashboard');
}

function doLogout(){
  CU=null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-role').value='';
  [1,2,3,4].forEach(function(i){ document.getElementById('p'+i).value=''; });
  document.getElementById('pin-row').style.display='none';
  document.getElementById('pin-hint').style.display='none';
}

// -- NAV --
function buildNav(){
  var role=CU.role;
  if(CU.key==='td') role='duty';
  var items=NAV[role]||NAV.student;
  var html='';
  items.forEach(function(item){
    if(item.sec){ html+='<div class="nav-section">'+item.sec+'</div>'; }
    else { html+='<div class="nav-item" data-page="'+item.id+'" onclick="go(\''+item.id+'\')"><span class="nav-icon">'+item.ic+'</span>'+item.lbl+'</div>'; }
  });
  document.getElementById('sidebar-nav').innerHTML=html;
}

function go(page){
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.toggle('active', el.dataset.page===page); });
  var titles={dashboard:'Dashboard',register:'Class Register',lessonplan:'Lesson Plans',scheme:'Scheme of Work',discipline:'Discipline Records',occurrence:'Occurrence Book','admin-register':'Register Monitor','admin-classes':'Manage Classes',suggestions:'Suggestion Box'};

function rReg(){
  var mc=document.getElementById('mc');
  var myCls=CU.classes||['10E','10W'];
  var tabs='<div class="tabs">';
  myCls.forEach(function(c,i){ tabs+='<div class="tab'+(i===0?' active':'')+'" onclick="swTab(\''+c+'\')">'+clslbl(c)+'</div>'; });
  tabs+='</div>';
  var panels='';
  myCls.forEach(function(c,i){ panels+='<div class="tab-panel'+(i===0?' active':'')+'" id="rp-'+c+'">'+buildRegPanel(c)+'</div>'; });
  mc.innerHTML=tabs+panels;
}

function buildRegPanel(cls){
  var sts=dbg('s'+cls)||[];
  var today=tdkey();
  var regs=dbg('regs')||{};
  var todayR=(regs[today]&&regs[today][cls])||{};
  var isMarked=Object.keys(todayR).length>0;
  var pres=Object.values(todayR).filter(function(v){ return v==='present'; }).length;
  var abs=Object.values(todayR).filter(function(v){ return v==='absent'; }).length;
  var late=Object.values(todayR).filter(function(v){ return v==='late'; }).length;
  var h='<div class="card" style="margin-bottom:14px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">';
  h+='<div><div style="font-family:\'Libre Baskerville\',serif;font-weight:700;font-size:1rem;color:var(--gd)">'+clslbl(cls)+' -- '+new Date().toLocaleDateString('en-KE',{weekday:'long',day:'numeric',month:'long'})+'</div>';
  h+='<div style="font-size:0.78rem;color:var(--muted)">'+sts.length+' students enrolled</div></div>';
  if(isMarked) h+='<div style="display:flex;gap:10px;flex-wrap:wrap"><span class="badge bg">Present: '+pres+'</span><span class="badge br">Absent: '+abs+'</span><span class="badge ba">Late: '+late+'</span></div>';
  h+='</div>';
  if(!isMarked) h+='<div style="margin-top:10px;padding:10px 14px;background:var(--redbg);color:var(--red);border:1px solid rgba(192,57,43,0.2);border-radius:7px;font-size:0.85rem">Register not yet marked for today.</div>';
  h+='</div>';
  h+='<div class="card" style="padding:0;overflow:hidden">';
  h+='<div style="padding:12px 16px;background:var(--off);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
  h+='<div style="font-size:0.82rem;font-weight:600;color:var(--muted)">ATTENDANCE</div>';
  h+='<div style="display:flex;gap:8px"><button class="btn btn-sm btn-p" onclick="markAll(\''+cls+'\',\'present\')">Mark All Present</button><button class="btn btn-sm btn-s" onclick="saveReg(\''+cls+'\')">Save Register</button></div></div>';
  sts.forEach(function(s){
    var status=todayR[s.id]||'';
    h+='<div class="reg-student" id="row-'+cls+'-'+s.id+'">';
    h+='<div><div class="reg-name">'+s.name+'</div><div class="reg-adm">'+s.adm+' / '+s.gender+'</div></div>';
    h+='<div class="reg-actions">';
    h+='<button class="rb rb-p'+(status==='present'?' on':'')+'" onclick="setSt(\''+cls+'\',\''+s.id+'\',\'present\',this)">Present</button>';
    h+='<button class="rb rb-a'+(status==='absent'?' on':'')+'" onclick="setSt(\''+cls+'\',\''+s.id+'\',\'absent\',this)">Absent</button>';
    h+='<button class="rb rb-l'+(status==='late'?' on':'')+'" onclick="setSt(\''+cls+'\',\''+s.id+'\',\'late\',this)">Late</button>';
    h+='</div></div>';
  });
  h+='</div><div style="margin-top:14px"><button class="btn btn-p" onclick="saveReg(\''+cls+'\')">Save &amp; Submit Register</button></div>';
  return h;
}

function swTab(cls){
  var myCls=CU.classes||['10E','10W'];
  document.querySelectorAll('.tabs .tab').forEach(function(t,i){ t.classList.toggle('active', myCls[i]===cls); });
  myCls.forEach(function(c){ var p=document.getElementById('rp-'+c); if(p) p.classList.toggle('active',c===cls); });
}

function setSt(cls, sid, status, btn){
  var regs=dbg('regs')||{}; var today=tdkey();
  if(!regs[today]) regs[today]={};
  if(!regs[today][cls]) regs[today][cls]={};
  regs[today][cls][sid]=status;
  dbs('regs',regs);
  var row=document.getElementById('row-'+cls+'-'+sid);
  if(row){ row.querySelectorAll('.rb').forEach(function(b){ b.classList.remove('on'); }); btn.classList.add('on'); }
}

function markAll(cls, status){
  var sts=dbg('s'+cls)||[]; var regs=dbg('regs')||{}; var today=tdkey();
  if(!regs[today]) regs[today]={};
  regs[today][cls]={};
  sts.forEach(function(s){ regs[today][cls][s.id]=status; });
  dbs('regs',regs);
  var panel=document.getElementById('rp-'+cls);
  if(panel) panel.innerHTML=buildRegPanel(cls);
}

function saveReg(cls){
  var regs=dbg('regs')||{}; var today=tdkey();
  if(!regs[today]||!regs[today][cls]||Object.keys(regs[today][cls]).length===0){ alert('Mark at least one student first.'); return; }
  dbs('regs',regs);
  toast('Register for '+clslbl(cls)+' saved.');
  var panel=document.getElementById('rp-'+cls);
  if(panel) panel.innerHTML=buildRegPanel(cls);
}

function saveDisc(){

function getDiscAdvice(){

  var inc=document.getElementById('d-inc').value||'unspecified behaviour';

}

// -- CLAUDE API --
function callClaude(prompt, onSuccess, onError){
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  }).then(function(r){ return r.json(); })
  .then(function(data){
    var text=(data.content||[]).map(function(b){ return b.text||''; }).join('');
    if(text) onSuccess(text);
    else onError();
  }).catch(function(){ onError(); });
}

// -- UTILITIES --
function cpAI(id){
  var txt=document.getElementById(id);
  if(!txt) return;
  navigator.clipboard.writeText(txt.textContent).then(function(){ toast('Copied to clipboard!'); });
}

function prAI(id){
  var txt=document.getElementById(id);
  if(!txt) return;
  var w=window.open('','_blank');
  w.document.write('<html><head><title>DARO360 - Jitihada Senior School</title><style>body{font-family:monospace;font-size:12px;line-height:1.8;padding:20px;white-space:pre-wrap}</style></head><body>'+txt.textContent+'</body></html>');
  w.document.close(); w.print();
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function openSB(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('vis'); }
function closeSB(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('vis'); }
