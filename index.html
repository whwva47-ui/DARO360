<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d4a2f">
<title>DARO360 - Jitihada Senior School</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gd:#0d4a2f;--gm:#155e3a;--gl:#1e7a4a;--gp:#e8f5ee;--gold:#c8952a;--goldf:#f0b429;--wh:#fff;--off:#f7faf8;--tx:#1a2e22;--mu:#5a7a65;--bd:#d0e4d8;--red:#c0392b;--rbg:#fdf2f2;--amb:#d97706;--abg:#fffbeb;--blu:#1d6fa4;--bbg:#eff6ff;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;color:var(--tx);background:var(--off);}
/* LOGIN */
#ls{position:fixed;inset:0;z-index:1000;background:var(--gd);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.lc{background:#fff;border-radius:16px;padding:36px;width:min(460px,95vw);box-shadow:0 24px 64px rgba(0,0,0,0.35);}
.ll{font-family:'Libre Baskerville',serif;font-size:1.8rem;font-weight:700;color:var(--gd);}
.ll span{color:var(--gold);}
.lsc{font-size:0.75rem;color:var(--mu);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:24px;}
.llb{font-size:0.7rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;display:block;}
.lsel,.lbtn{width:100%;padding:11px 14px;border-radius:8px;font-family:inherit;font-size:0.92rem;}
.lsel{border:1px solid var(--bd);color:var(--tx);background:var(--off);appearance:none;margin-bottom:14px;}
.lbtn{background:var(--gd);color:#fff;border:none;font-weight:700;cursor:pointer;margin-top:4px;}
.lbtn:hover{background:var(--gm);}
.pr{display:none;gap:8px;margin-bottom:12px;}
.pr input{flex:1;padding:11px;text-align:center;font-size:1.2rem;font-weight:700;border:1px solid var(--bd);border-radius:8px;font-family:inherit;background:var(--off);color:var(--tx);}
.ph{font-size:0.75rem;color:var(--mu);margin-bottom:10px;display:none;}
/* APP */
#app{display:none;height:100vh;flex-direction:row;}
#app.vis{display:flex;}
.sb{width:230px;flex-shrink:0;background:var(--gd);display:flex;flex-direction:column;overflow-y:auto;border-right:3px solid var(--gold);}
.sbl{padding:18px 16px 14px;font-family:'Libre Baskerville',serif;font-size:1.15rem;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,0.1);}
.sbl span{color:var(--goldf);}
.sbsc{font-size:0.6rem;color:rgba(255,255,255,0.45);font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
.sbu{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:0.75rem;color:rgba(255,255,255,0.6);}
.sbu strong{display:block;color:#fff;font-size:0.82rem;}
.sbu em{font-style:normal;font-size:0.68rem;color:var(--goldf);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
.snv{flex:1;padding:8px 0;overflow-y:auto;}
.nsc{padding:7px 16px 3px;font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.72);cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;}
.ni:hover{background:rgba(255,255,255,0.06);color:#fff;}
.ni.active{background:rgba(255,255,255,0.1);color:#fff;border-left-color:var(--goldf);}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:0.58rem;font-weight:700;padding:1px 5px;border-radius:9px;min-width:16px;text-align:center;}
.slo{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.8rem;color:rgba(255,255,255,0.4);cursor:pointer;}
.slo:hover{color:rgba(255,255,255,0.8);}
/* MAIN */
.mn{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.tb{padding:12px 22px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
.tbt{font-family:'Libre Baskerville',serif;font-size:1.05rem;font-weight:700;color:var(--gd);}
.tbd{font-size:0.75rem;color:var(--mu);text-align:right;}
.ct{padding:22px;flex:1;}
/* LAYOUT */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;margin-bottom:18px;}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:18px;}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:18px;}
/* CARDS */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:18px;}
.ct2{font-family:'Libre Baskerville',serif;font-size:0.92rem;font-weight:700;color:var(--gd);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sc{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:16px;border-left:4px solid var(--gl);}
.sn{font-family:'Libre Baskerville',serif;font-size:1.75rem;font-weight:700;color:var(--gd);line-height:1;}
.sl{font-size:0.7rem;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
/* BADGES */
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:0.7rem;font-weight:700;}
.bg{background:rgba(30,122,74,0.1);color:var(--gl);border:1px solid rgba(30,122,74,0.2);}
.ba{background:var(--abg);color:var(--amb);border:1px solid rgba(217,119,6,0.2);}
.br{background:var(--rbg);color:var(--red);border:1px solid rgba(192,57,43,0.2);}
.bb{background:var(--bbg);color:var(--blu);border:1px solid rgba(29,111,164,0.2);}
.bgr{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;}
.bgold{background:rgba(200,149,42,0.12);color:var(--gold);border:1px solid rgba(200,149,42,0.25);}
/* FORMS */
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:11px;margin-bottom:11px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:0.68rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--mu);}
.fi,.fs,.ft{padding:8px 11px;border:1px solid var(--bd);border-radius:7px;font-family:inherit;font-size:0.86rem;color:var(--tx);background:var(--off);width:100%;}
.fs{appearance:none;}
.ft{resize:vertical;min-height:75px;}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--gl);box-shadow:0 0 0 3px rgba(30,122,74,0.1);}
/* BUTTONS */
.btn{padding:8px 18px;border-radius:7px;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.bp{background:var(--gd);color:#fff;}.bp:hover{background:var(--gm);}
.bs{background:transparent;color:var(--gd);border:1px solid var(--gd);}.bs:hover{background:var(--gp);}
.bd2{background:var(--red);color:#fff;}.bd2:hover{background:#a93226;}
.bgo{background:var(--gold);color:#fff;}.bgo:hover{background:var(--goldf);color:var(--gd);}
.bamb{background:var(--amb);color:#fff;}
.bsm{padding:4px 11px;font-size:0.75rem;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
/* TABLES */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.83rem;}
th{text-align:left;padding:8px 11px;font-size:0.68rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--mu);background:var(--off);border-bottom:2px solid var(--bd);}
td{padding:9px 11px;border-bottom:1px solid var(--bd);vertical-align:middle;}
tr:last-child td{border-bottom:none;}tr:hover td{background:var(--gp);}
/* REGISTER */
.rs{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--bd);gap:10px;flex-wrap:wrap;}
.rs:last-child{border-bottom:none;}
.rn{font-weight:600;font-size:0.86rem;}
.ra2{font-size:0.72rem;color:var(--mu);}
.rac{display:flex;gap:5px;flex-wrap:wrap;}
.rb{padding:4px 11px;border-radius:5px;font-size:0.72rem;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.rbp{background:rgba(30,122,74,0.1);color:var(--gl);border-color:rgba(30,122,74,0.25);}
.rbp.on{background:var(--gl);color:#fff;border-color:var(--gl);}
.rba{background:var(--rbg);color:var(--red);border-color:rgba(192,57,43,0.2);}
.rba.on{background:var(--red);color:#fff;border-color:var(--red);}
.rbl{background:var(--abg);color:var(--amb);border-color:rgba(217,119,6,0.2);}
.rbl.on{background:var(--amb);color:#fff;border-color:var(--amb);}
/* RECORDS */
.rec{padding:13px 15px;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:9px;border-left:4px solid var(--gl);}
.rec.ser{border-left-color:var(--red);}
.rec.mod{border-left-color:var(--amb);}
.rm{font-size:0.72rem;color:var(--mu);margin-bottom:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.rtx{font-size:0.86rem;color:var(--tx);line-height:1.5;}
/* AI OUTPUT */
.aio{background:var(--off);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-top:13px;display:none;}
.aio.vis{display:block;}
.aih{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--bd);}
.aih h4{font-family:'Libre Baskerville',serif;font-size:0.88rem;font-weight:700;color:var(--gd);}
.ait{font-size:0.8rem;line-height:1.8;white-space:pre-wrap;color:var(--tx);}
/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:18px;overflow-x:auto;}
.tab{padding:9px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.active{color:var(--gd);border-bottom-color:var(--gd);}
.tp{display:none;}.tp.active{display:block;}
/* DUTY */
.duty-hdr{background:var(--gd);color:#fff;border-radius:var(--r);padding:18px 22px;margin-bottom:18px;}
.shift-row{display:flex;gap:8px;margin-bottom:18px;}
.sh-btn{flex:1;padding:10px;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;border:2px solid var(--bd);background:#fff;color:var(--mu);transition:all 0.2s;text-align:center;}
.sh-btn.active{border-color:var(--gd);background:var(--gd);color:#fff;}
.pref-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);}
.pref-item:last-child{border-bottom:none;}
.area-item{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-bottom:1px solid var(--bd);}
.area-item:last-child{border-bottom:none;}
.pf-btn,.ar-btn{padding:4px 10px;border-radius:4px;font-size:0.7rem;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.pf-p{background:rgba(30,122,74,0.1);color:var(--gl);border-color:rgba(30,122,74,0.2);}
.pf-p.on{background:var(--gl);color:#fff;}
.pf-a{background:var(--rbg);color:var(--red);border-color:rgba(192,57,43,0.2);}
.pf-a.on{background:var(--red);color:#fff;}
.ar-c{background:rgba(30,122,74,0.1);color:var(--gl);border-color:rgba(30,122,74,0.2);}
.ar-c.on{background:var(--gl);color:#fff;}
.ar-n{background:var(--rbg);color:var(--red);border-color:rgba(192,57,43,0.2);}
.ar-n.on{background:var(--red);color:#fff;}
.log-item{padding:9px 11px;border-radius:6px;border:1px solid var(--bd);margin-bottom:7px;background:#fff;}
.crit-row{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--off);border:1px solid var(--bd);border-radius:8px;margin-bottom:7px;}
/* PERSONS */
.msel-list{max-height:160px;overflow-y:auto;border:1px solid var(--bd);border-radius:7px;background:#fff;margin-top:4px;}
.msel-item{display:flex;align-items:center;gap:8px;padding:6px 11px;border-bottom:1px solid var(--bd);cursor:pointer;font-size:0.83rem;}
.msel-item:last-child{border-bottom:none;}
.msel-item:hover{background:var(--gp);}
.msel-item input{accent-color:var(--gl);width:13px;height:13px;flex-shrink:0;}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;min-height:30px;padding:5px;border:1px solid var(--bd);border-radius:7px;background:#fff;}
.ptag{display:inline-flex;align-items:center;gap:4px;background:var(--gp);color:var(--gl);border:1px solid rgba(30,122,74,0.2);padding:2px 9px;border-radius:20px;font-size:0.72rem;font-weight:600;}
.ptag-x{cursor:pointer;color:var(--mu);font-size:0.82rem;margin-left:2px;}
.ptag-x:hover{color:var(--red);}
/* LOCATION */
.loc-edit{background:var(--off);border:1px solid var(--bd);border-radius:8px;padding:13px;margin-bottom:13px;display:none;}
.loc-edit.vis{display:block;}
/* DIALOG / REMINDER */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:center;justify-content:center;}
.dialog-overlay.vis{display:flex;}
.dialog{background:#fff;border-radius:14px;padding:28px;width:min(460px,92vw);box-shadow:0 16px 48px rgba(0,0,0,0.25);}
.dialog h3{font-family:'Libre Baskerville',serif;font-weight:700;color:var(--gd);margin-bottom:8px;font-size:1rem;}
.dialog p{font-size:0.88rem;color:var(--mu);line-height:1.65;margin-bottom:16px;}
.dialog-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
/* COMMUNITY */
.comm-msg{padding:11px 14px;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;}
.comm-meta{font-size:0.72rem;color:var(--mu);margin-bottom:4px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.comm-txt{font-size:0.86rem;color:var(--tx);line-height:1.5;}
.comm-input{border-top:1px solid var(--bd);padding-top:14px;margin-top:14px;}
/* ALERT BANNER */
.alert-banner{background:var(--rbg);border:1px solid rgba(192,57,43,0.25);border-radius:8px;padding:11px 14px;margin-bottom:14px;font-size:0.84rem;color:var(--red);display:flex;align-items:flex-start;gap:10px;}
.alert-banner.warn{background:var(--abg);border-color:rgba(217,119,6,0.25);color:var(--amb);}
/* STAFF CARD */
.staff-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:6px;}
.staff-name{font-weight:700;font-size:0.9rem;color:var(--gd);}
.staff-role{font-size:0.72rem;color:var(--mu);}
.staff-subj{font-size:0.75rem;color:var(--tx);}
/* MISC */
.empty{text-align:center;padding:36px 18px;color:var(--mu);}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--gd);color:#fff;padding:9px 18px;border-radius:8px;font-size:0.83rem;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity 0.3s;opacity:0;pointer-events:none;}
.toast.show{opacity:1;}
.tt-wrap{overflow-x:auto;}
.tt-grid{display:grid;gap:1px;background:var(--bd);border-radius:var(--r);overflow:hidden;font-size:0.73rem;min-width:420px;}
.tt-cell{background:#fff;padding:5px 7px;min-height:36px;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;gap:2px;}
.tt-hdr{background:var(--gd);color:#fff;font-weight:700;font-size:0.65rem;letter-spacing:0.06em;text-transform:uppercase;}
.tt-time{background:var(--off);font-weight:600;font-size:0.67rem;color:var(--mu);justify-content:flex-start;padding-left:8px;}
.tt-lesson{background:var(--gp);cursor:pointer;}
.tt-lesson:hover{background:rgba(30,122,74,0.15);}
.tt-lesson .tl-sub{font-weight:700;color:var(--gd);font-size:0.73rem;}
.tt-lesson .tl-cls{font-size:0.62rem;color:var(--mu);}
.tt-break{background:var(--abg);color:var(--amb);font-size:0.65rem;}
.tt-next{background:var(--gd)!important;border:2px solid var(--gold)!important;}
.tt-next .tl-sub{color:#fff!important;}
.tt-next .tl-cls{color:rgba(255,255,255,0.7)!important;}
.tt-empty{color:var(--bd);}
.nxt-banner{background:var(--gd);color:#fff;border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.nxt-banner .nb-label{font-size:0.65rem;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.08em;}
.nxt-banner .nb-lesson{font-size:0.95rem;font-weight:700;}
.nxt-banner .nb-meta{font-size:0.75rem;color:rgba(255,255,255,0.75);}
.upl-drop{border:2px dashed var(--bd);border-radius:var(--r);padding:28px 18px;text-align:center;cursor:pointer;transition:border-color 0.2s;background:var(--off);}
.upl-drop:hover{border-color:var(--gl);background:var(--gp);}
.upl-drop input[type=file]{display:none;}
.assess-inp{width:68px;padding:5px 7px;border:1px solid var(--bd);border-radius:5px;font-family:inherit;font-size:0.82rem;text-align:center;background:var(--off);}
.assess-inp:focus{outline:none;border-color:var(--gl);}
.hbg{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--gd);font-size:1.3rem;}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:190;}
.ovl.vis{display:block;}
@media(max-width:700px){
  .sb{position:fixed;left:-230px;top:0;bottom:0;z-index:200;transition:left 0.25s;height:100vh;}
  .sb.open{left:0;}.hbg{display:block;}.ct{padding:13px;}
}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="ls">
  <div class="lc">
    <div class="ll">DARO<span>360</span></div>
    <div class="lsc">Jitihada Senior School</div>
    <label class="llb">Sign in as</label>
    <select class="lsel" id="lr" onchange="rcg()">
      <option value="">-- Select your role --</option>
      <optgroup label="School Leadership">
        <option value="principal">Principal Kamau wa Njoroge</option>
        <option value="dp_academic">Deputy Principal (Academic) - Mrs. Wanjiku Njeri</option>
        <option value="dp_admin">Deputy Principal (Admin) - Mr. Oduya Otieno</option>
        <option value="senior">Senior Teacher - Mrs. Beatrice Achieng</option>
      </optgroup>
      <optgroup label="Heads of Department">
        <option value="hod_lang">HOD Languages - Mrs. Sarah Atieno</option>
        <option value="hod_sci">HOD Sciences - Dr. John Karanja</option>
        <option value="hod_math">HOD Mathematics - Mrs. Grace Wanjiku</option>
        <option value="hod_hum">HOD Humanities - Mrs. Mary Akinyi</option>
        <option value="hod_tech">HOD Technical &amp; Applied - Mr. Moses Gitau</option>
      </optgroup>
      <optgroup label="Class Teachers &amp; Subject Teachers">
        <option value="tf">Felix Ochieng - English / Literature (Grade 10)</option>
        <option value="ta">Amina Hassan - Kiswahili / Fasihi (Grade 10)</option>
        <option value="tp">Peter Mwangi - French / English (Form 3 &amp; 4)</option>
        <option value="tj">James Mutua - Biology / Chemistry (Form 3 &amp; 4)</option>
        <option value="tr">Ruth Nekesa - Physics / Mathematics</option>
        <option value="td2">Diana Waweru - Chemistry / Biology</option>
        <option value="ts">Samuel Rotich - Mathematics / Physics</option>
        <option value="tl">Lydia Kamau - Mathematics / Computer Studies</option>
        <option value="tk">Kevin Odhiambo - History &amp; Citizenship / CRE</option>
        <option value="tbe">Beatrice Njoroge - Geography / Business Studies</option>
        <option value="tpa">Paul Simiyu - Business Studies / Economics</option>
        <option value="tan">Ann Wangari - Agriculture / Biology</option>
        <option value="tch">Charles Kipchoge - Computer Studies / Mathematics</option>
        <option value="tjo">Joyce Adhiambo - Home Science / Biology</option>
      </optgroup>
      <optgroup label="Other Roles">
        <option value="exams_hod">HOD Exams - Mrs. Caroline Mutua</option>
        <option value="duty">Duty Teacher - On Duty Today</option>
        <option value="student">Learner - Anonymous Access</option>
      </optgroup>
    </select>

function getReminders(){
  var r=[];
  var regs=dbg('regs')||{};var today=tdk();
  var schemes=dbg('schemes_submitted')||{};
  var lps=dbg('lp_submitted')||{};
  // Specific register reminders - named teacher
  ALL_CLASSES.forEach(function(c){
    if(!(regs[today]&&regs[today][c]&&Object.keys(regs[today][c]).length>0)){
      var tchr=CLASS_TEACHERS[c]||'Class Teacher';
      r.push({type:'urgent',msg:tchr+' has NOT marked the register for '+cln(c)+' today.',target:tchr,taskMsg:'Please mark the register for '+cln(c)+' immediately. It is required by 9:00 AM.'});
    }
  });
  // Specific scheme reminders - named teacher
  if(['principal','dp_academic','senior'].includes(CU&&CU.role?CU.role:'')){
    Object.keys(STAFF).filter(function(k){return ['teacher','hod'].includes(STAFF[k].role);}).forEach(function(k){
      var s=STAFF[k];

  if(role!=='student'){

  document.getElementById('td2').textContent=fullDate();
  buildNav();go('dashboard');
  // Show reminder dialog for senior roles
  if(['principal','dp_academic','dp_admin','senior','hod'].includes(CU.role)){
    var rem=getReminders();

        var urgent=rem.filter(function(r){return r.type==='urgent';});

        showDialog('Pending Alerts -- '+dayName(),shown.slice(0,4).map(function(r){return '- '+r.msg;}).join('\n'),[

function sendReminder(){

  dbp('reminders',{id:Date.now(),from:CU.name,to:target?target.value:'All Staff',msg:msg.value.trim(),date:new Date().toLocaleDateString('en-KE')});
  msg.value='';toast('Reminder sent.');
}
function sendTeacherReminder(name,defaultMsg){

      toast('Reminder sent to '+name+'.');
    }},
    {lbl:'Cancel',cls:'bs',fn:function(){}}
  ]);
}

var TT_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
var TT_PERIODS = [
  {id:'p1', label:'P1',  time:'7:30 - 8:10',   type:'lesson'},
  {id:'p2', label:'P2',  time:'8:10 - 8:50',   type:'lesson'},

  {id:'p5', label:'P5',  time:'11:10 - 11:50', type:'lesson'},
  {id:'p6', label:'P6',  time:'11:50 - 12:30', type:'lesson'},
  {id:'lun',label:'Lun', time:'12:30 - 2:00',  type:'break'},

  {id:'p8', label:'P8',  time:'2:40 - 3:20',   type:'lesson'}

// ── Get next lesson today for this teacher ─────────────────────
function getNextLesson(){
  var tts = dbg('timetables') || {};
  var myTT = tts[CU.key];
  if(!myTT) return null;
  var now = new Date();
  var dayIdx = now.getDay() - 1; // Mon=0 … Fri=4
  if(dayIdx < 0 || dayIdx > 4) return null;
  var day = TT_DAYS[dayIdx];
  var nowMins = now.getHours()*60 + now.getMinutes();
  var found = null;
  TT_PERIODS.forEach(function(p){
    if(found || p.type === 'break') return;
    var slot = myTT[day] && myTT[day][p.id];
    if(!slot) return;
    // parse period start time
    var parts = p.time.split(' - ')[0].split(':');
    var startMins = parseInt(parts[0])*60 + parseInt(parts[1]);
    if(startMins > nowMins) found = {period:p, slot:slot, day:day};
  });
  return found;
}

// ── Build the visual timetable grid ───────────────────────────

  var cols = 1 + TT_DAYS.length;

  h += '<div class="ct2">My Timetable <span style="font-size:0.72rem;font-weight:400;color:var(--mu)">-- '+new Date().toLocaleDateString('en-KE',{weekday:'long'})+'</span></div>';

  TT_DAYS.forEach(function(d){
    h += '<div class="tt-cell tt-hdr">'+d.slice(0,3)+'</div>';
  });
  // Rows
  TT_PERIODS.forEach(function(p){
    if(p.type === 'break'){
      h += '<div class="tt-cell tt-time">'+p.label+'<div style="font-size:0.6rem">'+p.time+'</div></div>';
      for(var i=0;i<5;i++) h += '<div class="tt-cell tt-break">'+p.label+'</div>';

    }
    h += '<div class="tt-cell tt-time">'+p.label+'<div style="font-size:0.6rem">'+p.time+'</div></div>';
    TT_DAYS.forEach(function(d){
      var slot = myTT[d] && myTT[d][p.id];
      var isNext = nxt && nxt.day === d && nxt.period.id === p.id;
      if(slot){
        h += '<div class="tt-cell tt-lesson'+(isNext?' tt-next':'')+'">';

      } else {

      }
    });
  });
  h += '</div></div></div>';
  return h;
}

// ── Photo upload: AI reads the image ─────────────────────────
function uploadTTPhoto(event){
  var file = event.target.files && event.target.files[0];
  if(!file) return;
  var fb = document.getElementById('tt-feedback');
  if(fb){
    fb.innerHTML = '<div class="card" style="margin-top:13px"><div style="display:flex;align-items:center;gap:10px"><span class="spinner" style="border-top-color:var(--gd);border-color:var(--bd);width:16px;height:16px;border-width:2px"></span><div><div style="font-weight:600;color:var(--gd)">Reading your timetable...</div><div style="font-size:0.78rem;color:var(--mu)">AI is analysing your photo. This takes about 10 seconds.</div></div></div></div>';
  }
  var reader = new FileReader();
  reader.onload = function(e){
    var b64 = e.target.result.split(',')[1];
    var prompt = 'This is a school teacher\'s printed timetable. Read it carefully and extract every lesson.\n\nReturn ONLY valid JSON, nothing else, no markdown.\n\nFormat:\n{"Monday":{"p1":{"subject":"English","cls":"10E"},"p2":{"subject":"Maths","cls":"F3"}},"Tuesday":{...},...}\n\nPeriod IDs: p1=7:30-8:10, p2=8:10-8:50, p3=8:50-9:30, p4=10:30-11:10, p5=11:10-11:50, p6=11:50-12:30, p7=2:00-2:40, p8=2:40-3:20\n\nOnly include periods with actual lessons. Skip breaks. Return only JSON.';
    fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt, imageBase64:b64, imageType:file.type||'image/jpeg'})
    })
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error){
        if(fb) fb.innerHTML='<div class="card" style="margin-top:13px;border-left:3px solid var(--red)"><div style="color:var(--red);font-weight:600;margin-bottom:6px">Could not read photo</div><div style="font-size:0.82rem;color:var(--mu)">'+data.error+'</div><div style="margin-top:10px"><button class="btn bs" onclick="showTTManual()">Enter manually instead</button></div></div>';
        return;
      }
      var text = (data.text||'').replace(/```json/g,'').replace(/```/g,'').trim();
      try{
        var parsed = JSON.parse(text);
        var tts = dbg('timetables')||{};
        tts[CU.key] = parsed;
        dbs('timetables', tts);
        toast('Timetable read and saved!');
        rTimetable();
      }catch(err){
        if(fb) fb.innerHTML='<div class="card" style="margin-top:13px;border-left:3px solid var(--amb)"><div style="color:var(--amb);font-weight:600;margin-bottom:6px">Photo read but could not parse</div><div style="font-size:0.78rem;color:var(--mu);margin-bottom:10px">The AI read your photo but the timetable format was unusual. Please enter it manually.</div><div style="background:var(--off);padding:9px;border-radius:6px;font-size:0.72rem;color:var(--mu);margin-bottom:10px;word-break:break-all">'+text.slice(0,300)+'</div><button class="btn bs" onclick="showTTManual()">Enter manually</button></div>';
      }
    })
    .catch(function(err){
      if(fb) fb.innerHTML='<div class="card" style="margin-top:13px;border-left:3px solid var(--red)"><div style="color:var(--red);font-weight:600;margin-bottom:6px">Connection error</div><div style="font-size:0.82rem;color:var(--mu);margin-bottom:10px">Check your internet connection and try again.</div><button class="btn bs" onclick="showTTManual()">Enter manually instead</button></div>';
    });
  };
  reader.readAsDataURL(file);
}

  h+='</div><div class="card" style="padding:0;overflow:hidden">';
  h+='<div style="padding:11px 14px;background:var(--off);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px">';
  h+='<div style="font-size:0.8rem;font-weight:600;color:var(--mu)">'+sts.length+' STUDENTS</div>';

function swT(cls){

function mAll(cls,status){
  var sts=dbg('s'+cls)||[];var regs=dbg('regs')||{};var today=tdk();

  sts.forEach(function(s){regs[today][cls][s.id]=status;});dbs('regs',regs);

function sReg(cls){

function upLPSub(){
  var sub=document.getElementById('lps');
  if(!sub)return;
  var isCBC=CU.cur==='cbc';var isBoth=CU.cur==='both';
  var strSel=document.getElementById('lpst');
  var topSel=document.getElementById('lptop');
  if((isCBC||isBoth)&&strSel){
    var strands=getSubjectStrands(sub.value);
    strSel.innerHTML='<option>-- Select strand --</option>'+strands.map(function(s){return '<option>'+s+'</option>';}).join('');
    upLPSubStrand();
  }
  if((!isCBC||isBoth)&&topSel){
    var topics=getTopics844(sub.value);
    topSel.innerHTML=topics.map(function(t){return '<option>'+t+'</option>';}).join('');
  }
  autoFillFromScheme();
}

function upLPSubStrand(){
  var sub=document.getElementById('lps');var str=document.getElementById('lpst');
  var ssSel=document.getElementById('lpss');var sloSel=document.getElementById('lpslo');
  if(!sub||!str||!ssSel)return;
  var subStrands=getSubStrands(sub.value,str.value);
  ssSel.innerHTML='<option>-- Select sub-strand --</option>'+subStrands.map(function(s){return '<option>'+s+'</option>';}).join('');
  var slos=getSLOs(sub.value,str.value);
  if(sloSel)sloSel.innerHTML='<option>-- Select SLO --</option>'+slos.map(function(s){return '<option>'+s+'</option>';}).join('');
}

function autoFillFromScheme(){
  var scheme=GENERATED_SCHEMES[CU.key];if(!scheme)return;
  var sub=document.getElementById('lps');var wk=document.getElementById('lpw');
  if(!sub||!wk)return;
  var wkNum=parseInt(wk.value.replace('Week ',''));
  var entry=scheme[sub.value]&&scheme[sub.value][wkNum];
  if(!entry)return;
  var strSel=document.getElementById('lpst');var ssSel=document.getElementById('lpss');
  var sloSel=document.getElementById('lpslo');var topSel=document.getElementById('lptop');
  var objEl=document.getElementById('lpobj');var kiqEl=document.getElementById('lpkiq');
  if(strSel&&entry.strand){
    strSel.value=entry.strand;
    upLPSubStrand();
    setTimeout(function(){
      if(ssSel&&entry.subStrand)ssSel.value=entry.subStrand;
      if(sloSel&&entry.slo)sloSel.value=entry.slo;
      if(kiqEl&&entry.kiq)kiqEl.value=entry.kiq;
    },50);
  }
  if(topSel&&entry.topic)topSel.value=entry.topic;
  if(objEl&&entry.objectives)objEl.value=entry.objectives;
  if(entry.strand||entry.topic)toast('Fields auto-filled from your scheme of work.');
}

function genSOW(){
  var sub=document.getElementById('ss').value;
  var cls=document.getElementById('sc2').value;
  var term=document.getElementById('st').value;
  var wks=document.getElementById('sw').value;
  var isCBC=CU.cur==='cbc';var isBoth=CU.cur==='both';
  var isClassCBC=cls.startsWith('10');
  var useCBC=isCBC||(isBoth&&isClassCBC);
  var btn=document.getElementById('sbtn');var ico=document.getElementById('sico');var tx=document.getElementById('stx');
  var out=document.getElementById('sout');var txt=document.getElementById('stxt');
  btn.disabled=true;ico.innerHTML='<span class="spinner"></span>';tx.textContent='Generating...';out.classList.remove('vis');
  var currData=KICD_CURRICULUM[sub];
  var currStr=currData?JSON.stringify(Object.keys(currData.strands).reduce(function(acc,s){acc[s]=currData.strands[s].subStrands;return acc;},{})): 'Use standard Kenya curriculum';
  var sep='================================================';
  var hdr=useCBC?'WK | STRAND | SUB-STRAND | SLO | KEY ACTIVITIES | RESOURCES | ASSESSMENT':'WK | TOPIC | SUB-TOPIC | OBJECTIVES | KEY ACTIVITIES | RESOURCES | ASSESSMENT';
  var prompt='Generate a complete, detailed '+term+' Scheme of Work for '+sub+', '+cln(cls)+', Jitihada Senior School, covering '+wks+'.\n';
  prompt+='KICD curriculum structure for this subject: '+currStr+'\n';
  prompt+=useCBC?'Use these exact strands and sub-strands from the KICD CBC curriculum.':'Use Kenya 8-4-4 curriculum topics.';
  prompt+=' Plain text only, no markdown.\n\n'+sep+'\nJITIHADA SENIOR SCHOOL - SCHEME OF WORK\n'+(useCBC?'(CBC Senior School)':'(8-4-4 Secondary)')+'\n';
  prompt+='Subject: '+sub+'  |  Class: '+cln(cls)+'  |  '+term+'\nTeacher: '+CU.name+'  |  Dept: '+CU.dept+'\n\n';
  prompt+=hdr+'\n---|'+Array(useCBC?56:56).join('-')+'---\n\n';
  prompt+='List all '+wks+' with accurate curriculum content. Each week on a new line.\n\n';
  prompt+=sep+'\nPrepared by: '+CU.name+'  HOD: ________________  Date: ________________\nDARO360 | Jitihada Senior School';
  callAPI(prompt,function(text){
    out.classList.add('vis');txt.textContent=text;
    btn.disabled=false;ico.textContent='G';tx.textContent='Generate Another';
    // Parse and store scheme for lesson plan auto-fill
    parseAndStoreScheme(sub,cls,term,text);
    toast('Scheme generated. Go to Lesson Plan to use auto-fill.');
  },function(err){
    out.classList.add('vis');txt.textContent='Error: '+err;
    btn.disabled=false;ico.textContent='G';tx.textContent='Try Again';
  });
}

function parseAndStoreScheme(sub,cls,term,text){
  // Extract week-by-week data from generated scheme for lesson plan auto-fill
  if(!GENERATED_SCHEMES[CU.key])GENERATED_SCHEMES[CU.key]={};
  if(!GENERATED_SCHEMES[CU.key][sub])GENERATED_SCHEMES[CU.key][sub]={};
  var lines=text.split('\n');
  var isCBC=cls.startsWith('10');
  lines.forEach(function(line){
    // Match patterns like "1 |" or "Week 1 |"
    var m=line.match(/^\s*(?:Week\s*)?(\d+)\s*\|(.+)/);
    if(!m)return;
    var wkNum=parseInt(m[1]);var rest=m[2];
    var parts=rest.split('|');
    if(isCBC){
      GENERATED_SCHEMES[CU.key][sub][wkNum]={
        strand:(parts[0]||'').trim(),
        subStrand:(parts[1]||'').trim(),
        slo:(parts[2]||'').trim(),
        kiq:''
      };
    }else{
      GENERATED_SCHEMES[CU.key][sub][wkNum]={
        topic:(parts[0]||'').trim(),
        objectives:(parts[2]||'').trim()
      };
    }
  });
}

function swComm(id){

  document.querySelectorAll('[id^="comm-"]').forEach(function(p){p.classList.remove('active');});

  document.querySelectorAll('.tabs .tab').forEach(function(t){
    t.classList.remove('active');

  });

// KCSE grading table
var KCSE_GRADES = [
  {min:75,max:100,grade:'A',points:12},
  {min:70,max:74,grade:'A-',points:11},
  {min:65,max:69,grade:'B+',points:10},
  {min:60,max:64,grade:'B',points:9},
  {min:55,max:59,grade:'B-',points:8},
  {min:50,max:54,grade:'C+',points:7},
  {min:45,max:49,grade:'C',points:6},
  {min:40,max:44,grade:'C-',points:5},
  {min:35,max:39,grade:'D+',points:4},
  {min:30,max:34,grade:'D',points:3},
  {min:25,max:29,grade:'D-',points:2},
  {min:0,max:24,grade:'E',points:1}
];

function getKcseGrade(score){
  for(var i=0;i<KCSE_GRADES.length;i++){
    var g=KCSE_GRADES[i];
    if(score>=g.min&&score<=g.max)return g;
  }
  return {grade:'E',points:1};
}

function getCbcLevel(score){
  if(score>=75)return{level:'EE',label:'Exceeds Expectation',color:'var(--gl)'};
  if(score>=50)return{level:'ME',label:'Meets Expectation',color:'var(--blu)'};
  if(score>=25)return{level:'AE',label:'Approaching Expectation',color:'var(--amb)'};
  return{level:'BE',label:'Below Expectation',color:'var(--red)'};
}

function gradeColor(grade){
  if(!grade)return'';
  if(grade.startsWith('A'))return'color:var(--gl);font-weight:700';
  if(grade.startsWith('B'))return'color:var(--blu);font-weight:700';
  if(grade.startsWith('C'))return'color:var(--amb);font-weight:700';
  return'color:var(--red);font-weight:700';
}

function swAssTab(n){
  document.querySelectorAll('.tabs .tab').forEach(function(t,i){t.classList.toggle('active',i===n);});
  [0,1,2].forEach(function(i){
    var el=document.getElementById('ass-tab'+i);

  });
  if(n===1){
    var div=document.getElementById('ass-tab1');
    if(div)div.innerHTML=buildAssAnalysis();
  }
}

function loadAssessmentForm(cur){
  var div=document.getElementById('ass-form');
  if(div)div.innerHTML=buildAssForm(cur);
}

function buildAssForm(cur){
  var isCBC=cur==='cbc';
  var myCls=(CU.classes||[]).filter(function(c){
    return isCBC?c.startsWith('10'):c.startsWith('F');
  });
  if(!myCls.length)myCls=isCBC?['10E','10W']:['F3','F4'];

  var clsOpts=myCls.map(function(c){return '<option value="'+c+'">'+cln(c)+'</option>';}).join('');
  var subOpts=(CU.subjects||[]).map(function(s){return '<option>'+s+'</option>';}).join('');

  var h='<div class="card"><div class="ct2">Enter Scores -- ';
  h+=isCBC?'CBC Competency Levels':'8-4-4 KCSE Grading';
  h+='</div>';
  h+='<div class="fr">';
  h+='<div class="fg"><label class="fl">Class</label>';
  h+='<select class="fs" id="ass-cls" onchange="loadAssStudents(\''+cur+'\')">'+clsOpts+'</select></div>';
  h+='<div class="fg"><label class="fl">Subject</label>';
  h+='<select class="fs" id="ass-sub">'+subOpts+'</select></div>';
  if(!isCBC){
    h+='<div class="fg"><label class="fl">Exam type</label>';
    h+='<select class="fs" id="ass-exam">';
    h+='<option value="opener">Opener (30%)</option>';
    h+='<option value="cat">CAT (30%)</option>';
    h+='<option value="endterm">End of Term (40%)</option>';
    h+='</select></div>';
  }
  h+='</div>';
  h+='<div id="ass-students" style="margin-top:11px"></div>';
  h+='<div id="ass-save-row" style="display:none;margin-top:11px">';
  h+='<button class="btn bp" onclick="saveScores(\''+cur+'\')">Save Scores</button>';
  h+='</div></div>';

  // Auto-load students after render
  setTimeout(function(){loadAssStudents(cur);},100);
  return h;
}

function loadAssStudents(cur){
  var isCBC=cur==='cbc';
  var clsEl=document.getElementById('ass-cls');
  if(!clsEl)return;
  var cls=clsEl.value;
  var sts=dbg('s'+cls)||[];
  var subEl=document.getElementById('ass-sub');
  var sub=subEl?subEl.value:'';
  var examEl=document.getElementById('ass-exam');
  var exam=(!isCBC&&examEl)?examEl.value:'';

  var storeKey=cls+'-'+sub+(exam?'-'+exam:'');
  var stored=dbg(isCBC?'assess_cbc':'assess_844')||{};
  var existing=stored[storeKey]||{};

  var h='<div class="tw"><table>';
  h+='<tr><th style="width:30px">#</th><th>Student</th><th>Adm No.</th>';
  h+='<th>Score (0-100)</th>';
  h+=isCBC?'<th>Competency Level</th>':'<th>Grade</th><th>Points</th>';
  h+='</tr>';

  sts.forEach(function(s,i){
    var sc=existing[s.id]!==undefined?existing[s.id]:'';
    var gradeInfo=sc!==''?(isCBC?getCbcLevel(parseInt(sc)):getKcseGrade(parseInt(sc))):null;
    h+='<tr>';
    h+='<td>'+(i+1)+'</td>';
    h+='<td>'+s.name+'</td>';
    h+='<td style="font-size:0.75rem;color:var(--mu)">'+s.adm+'</td>';
    h+='<td><input class="assess-inp" id="sc-'+s.id+'" type="number" min="0" max="100"';
    h+=' value="'+sc+'" placeholder="--"';
    h+=' oninput="liveGrade(this,\''+s.id+'\',\''+cur+'\')">';
    h+='</td>';
    if(isCBC){
      var lv=gradeInfo?gradeInfo:'';
      h+='<td id="lv-'+s.id+'" style="'+(lv?'color:'+lv.color+';font-weight:700':'color:var(--mu)')+'">'+( lv?lv.level+' -- '+lv.label:'--')+'</td>';
    }else{
      var g=gradeInfo||null;
      h+='<td id="gr-'+s.id+'" style="'+(g?gradeColor(g.grade):'color:var(--mu)')+'">'+( g?g.grade:'--')+'</td>';
      h+='<td id="pt-'+s.id+'" style="color:var(--mu)">'+( g?g.points:'--')+'</td>';
    }
    h+='</tr>';
  });
  h+='</table></div>';

  var div=document.getElementById('ass-students');
  if(div)div.innerHTML=h;
  var saveRow=document.getElementById('ass-save-row');
  if(saveRow)saveRow.style.display='block';
}

function liveGrade(inp,sid,cur){
  var isCBC=cur==='cbc';
  var sc=parseInt(inp.value);
  if(isNaN(sc)||sc<0||sc>100)return;
  if(isCBC){
    var lv=getCbcLevel(sc);
    var el=document.getElementById('lv-'+sid);
    if(el){el.textContent=lv.level+' -- '+lv.label;el.style.color=lv.color;el.style.fontWeight='700';}
  }else{
    var g=getKcseGrade(sc);
    var gel=document.getElementById('gr-'+sid);
    var pel=document.getElementById('pt-'+sid);
    if(gel){gel.textContent=g.grade;gel.style=gradeColor(g.grade);}
    if(pel)pel.textContent=g.points;
  }
}

function saveScores(cur){
  var isCBC=cur==='cbc';
  var clsEl=document.getElementById('ass-cls');
  var subEl=document.getElementById('ass-sub');
  var examEl=document.getElementById('ass-exam');
  if(!clsEl||!subEl){alert('Please select class and subject.');return;}
  var cls=clsEl.value;
  var sub=subEl.value;
  var exam=(!isCBC&&examEl)?examEl.value:'';
  var storeKey=cls+'-'+sub+(exam?'-'+exam:'');
  var key=isCBC?'assess_cbc':'assess_844';
  var stored=dbg(key)||{};
  if(!stored[storeKey])stored[storeKey]={};

  var sts=dbg('s'+cls)||[];
  var saved=0;
  sts.forEach(function(s){
    var inp=document.getElementById('sc-'+s.id);
    if(inp&&inp.value!==''){
      stored[storeKey][s.id]=parseInt(inp.value);
      saved++;
    }
  });
  dbs(key,stored);
  toast('Saved '+saved+' scores for '+cln(cls)+' -- '+sub+(exam?' ('+exam+')':''));
}

function buildAssAnalysis(){
  var myCls=CU.classes||[];
  var isCBC=CU.cur==='cbc';
  var isBoth=CU.cur==='both';

  var h='';

  // For each class show summary
  var found=false;
  ALL_CLASSES.forEach(function(cls){
    if(myCls.length&&myCls.indexOf(cls)===-1)return;
    var clsIsCBC=cls.startsWith('10');
    var key=clsIsCBC?'assess_cbc':'assess_844';
    var stored=dbg(key)||{};

    // Find entries for this class
    var entries=Object.keys(stored).filter(function(k){return k.startsWith(cls+'-');});
    if(!entries.length)return;
    found=true;

    h+='<div class="card" style="margin-bottom:13px">';
    h+='<div class="ct2">'+cln(cls)+' -- Assessment Results</div>';

    if(!clsIsCBC){
      // 8-4-4: show Opener, CAT, End Term separately + weighted total
      var subjects={};
      entries.forEach(function(k){
        var parts=k.split('-');var sub=parts[1];var exam=parts[2]||'';
        if(!subjects[sub])subjects[sub]={};
        subjects[sub][exam]=stored[k];
      });

      var sts=dbg('s'+cls)||[];
      h+='<div class="tw"><table>';
      h+='<tr><th>Student</th>';
      Object.keys(subjects).forEach(function(sub){
        h+='<th colspan="4" style="border-left:2px solid var(--bd);text-align:center">'+sub+'</th>';
      });
      h+='</tr>';
      h+='<tr><td></td>';
      Object.keys(subjects).forEach(function(){
        h+='<td style="font-size:0.66rem;color:var(--mu);border-left:2px solid var(--bd)">Op 30%</td>';
        h+='<td style="font-size:0.66rem;color:var(--mu)">CAT 30%</td>';
        h+='<td style="font-size:0.66rem;color:var(--mu)">ET 40%</td>';
        h+='<td style="font-size:0.66rem;color:var(--mu)">Total</td>';
      });
      h+='</tr>';

      sts.slice(0,20).forEach(function(s){
        h+='<tr><td style="white-space:nowrap">'+s.name+'</td>';
        Object.keys(subjects).forEach(function(sub){
          var sData=subjects[sub];
          var op=sData['opener']&&sData['opener'][s.id]!==undefined?sData['opener'][s.id]:null;
          var cat=sData['cat']&&sData['cat'][s.id]!==undefined?sData['cat'][s.id]:null;
          var et=sData['endterm']&&sData['endterm'][s.id]!==undefined?sData['endterm'][s.id]:null;
          var total=null;
          if(op!==null&&cat!==null&&et!==null){
            total=Math.round(op*0.3+cat*0.3+et*0.4);
          }
          var gInfo=total!==null?getKcseGrade(total):null;
          h+='<td style="text-align:center;border-left:2px solid var(--bd)">'+(op!==null?op:'--')+'</td>';
          h+='<td style="text-align:center">'+(cat!==null?cat:'--')+'</td>';
          h+='<td style="text-align:center">'+(et!==null?et:'--')+'</td>';
          h+='<td style="text-align:center;'+( gInfo?gradeColor(gInfo.grade):'color:var(--mu)')+'"><strong>'+(total!==null?total+'% '+gInfo.grade:'--')+'</strong></td>';
        });
        h+='</tr>';
      });
      h+='</table></div>';

      // Class averages per subject
      h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)">';
      h+='<div style="font-size:0.72rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Class averages</div>';
      h+='<div class="g3">';
      Object.keys(subjects).forEach(function(sub){
        var sData=subjects[sub];
        var totals=[];
        var sts2=dbg('s'+cls)||[];
        sts2.forEach(function(s){
          var op=sData['opener']&&sData['opener'][s.id]!==undefined?sData['opener'][s.id]:null;
          var cat=sData['cat']&&sData['cat'][s.id]!==undefined?sData['cat'][s.id]:null;
          var et=sData['endterm']&&sData['endterm'][s.id]!==undefined?sData['endterm'][s.id]:null;
          if(op!==null&&cat!==null&&et!==null)totals.push(Math.round(op*0.3+cat*0.3+et*0.4));
        });
        if(!totals.length)return;
        var avg=Math.round(totals.reduce(function(a,b){return a+b;},0)/totals.length);
        var g=getKcseGrade(avg);
        h+='<div style="padding:9px;border:1px solid var(--bd);border-radius:8px">';
        h+='<div style="font-weight:600;font-size:0.82rem;margin-bottom:3px">'+sub+'</div>';
        h+='<div style="font-size:1.1rem;font-weight:700;'+gradeColor(g.grade)+'">'+avg+'%</div>';
        h+='<div style="font-size:0.72rem;color:var(--mu)">Grade '+g.grade+' | '+totals.length+' students</div>';
        h+='</div>';
      });
      h+='</div></div>';
    }else{
      // CBC: show competency levels
      var sts=dbg('s'+cls)||[];
      entries.forEach(function(k){
        var parts=k.split('-');var sub=parts[1];
        var scores=stored[k];
        var vals=Object.values(scores).filter(function(v){return !isNaN(v);});
        if(!vals.length)return;
        var avg=Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
        var lv=getCbcLevel(avg);
        h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)">';
        h+='<div style="font-weight:600;font-size:0.84rem">'+sub+'</div>';
        h+='<div><span style="font-weight:700;color:'+lv.color+'">'+lv.level+'</span>';

function buildAssSubmit(){

      my844.forEach(function(k){
        var parts=k.split('-');
        h+='<div style="padding:5px 0;border-bottom:1px solid var(--bd);font-size:0.83rem">'+cln(parts[0])+' -- '+parts[1]+(parts[2]?' ('+parts[2]+')':'')+'</div>';
      });
      h+='</div>';
    }
  }
  if(isCBC||isBoth){
    var storedCBC=dbg('assess_cbc')||{};

    if(myCBC.length){
      hasCBC=true;
      h+='<div style="margin-bottom:11px"><div style="font-size:0.72rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">CBC Results ready to submit:</div>';
      myCBC.forEach(function(k){
        var parts=k.split('-');
        h+='<div style="padding:5px 0;border-bottom:1px solid var(--bd);font-size:0.83rem">'+cln(parts[0])+' -- '+parts[1]+'</div>';
      });

    }

  if(!has844&&!hasCBC){

  }

  h+='<button class="btn bp" '+((!has844&&!hasCBC)?'disabled':'')+' onclick="submitAssessment()">Submit to Exams Department</button>';
  h+='</div>';
  return h;
}

function submitAssessment(){
  var myCls=CU.classes||[];
  var compiled=dbg('results_compiled')||{};
  var stored844=dbg('assess_844')||{};
  var storedCBC=dbg('assess_cbc')||{};

  myCls.forEach(function(c){
    if(!compiled[c])compiled[c]={};
    compiled[c][CU.name]={
      name:CU.name,dept:CU.dept,subjects:CU.subjects,
      date:new Date().toLocaleDateString('en-KE'),
      data844:stored844,dataCBC:storedCBC
    };
  });
  dbs('results_compiled',compiled);

  // Notify exams HOD
  dbp('reminders',{
    id:Date.now(),from:CU.name,
    to:'Mrs. Caroline Mutua',
    msg:'Results submitted by '+CU.name+' ('+CU.dept+') for '+myCls.map(cln).join(', '),
    date:new Date().toLocaleDateString('en-KE')
  });
  toast('Results submitted to Exams Department.');
  swAssTab(2);
}

function compileClass(cls){
  var compiled=dbg('results_compiled')||{};
  if(!compiled[cls])compiled[cls]={};
  compiled[cls]['_compiled']={
    by:CU.name,date:new Date().toLocaleDateString('en-KE'),time:new Date().toLocaleTimeString('en-KE')
  };
  dbs('results_compiled',compiled);
  toast(cln(cls)+' compiled successfully.');
  rCompileResults();
}

function compileAllClasses(){
  ALL_CLASSES.forEach(function(cls){compileClass(cls);});
  toast('All classes compiled.');
}

function viewCompiledClass(cls){

  });

  var h='<div style="margin-top:11px;overflow-x:auto">';

    subjects.forEach(function(s){h+='<th colspan="4" style="border-left:2px solid var(--bd);text-align:center">'+s+'</th>';});

    h+='<tr><td colspan="2"></td>';

      h+='<td style="font-size:0.62rem;color:var(--mu);border-left:2px solid var(--bd)">Op</td>';
      h+='<td style="font-size:0.62rem;color:var(--mu)">CAT</td>';
      h+='<td style="font-size:0.62rem;color:var(--mu)">ET</td>';
      h+='<td style="font-size:0.62rem;color:var(--mu);font-weight:700">Tot</td>';
    });
    h+='<td></td><td></td></tr>';
    sts.slice(0,30).forEach(function(s,idx){
      var totals=[];
      h+='<tr><td>'+(idx+1)+'</td><td style="white-space:nowrap">'+s.name+'</td>';
      subjects.forEach(function(sub){
        var op=stored[cls+'-'+sub+'-opener']&&stored[cls+'-'+sub+'-opener'][s.id]!==undefined?stored[cls+'-'+sub+'-opener'][s.id]:null;

      });
      var mean=totals.length?Math.round(totals.reduce(function(a,b){return a+b;},0)/totals.length):null;
      var mg=mean!==null?getKcseGrade(mean):null;
      h+='<td style="font-weight:700;text-align:center;'+(mg?gradeColor(mg.grade):'')+'">'+(mean!==null?mean:'--')+'</td>';

  } else {
    subjects.forEach(function(s){h+='<th style="border-left:2px solid var(--bd)">'+s+'</th>';});

    sts.slice(0,30).forEach(function(s,idx){

function disburseClass(cls){
  var compiled=dbg('results_compiled')||{};
  var clsData=compiled[cls]||{};
  var sts=dbg('s'+cls)||[];
  var stored844=dbg('assess_844')||{};
  var storedCBC=dbg('assess_cbc')||{};
  var notifs=dbg('parent_notifs')||[];
  var isCBC=cls.startsWith('10');
  var count=0;

  sts.forEach(function(s){
    var scores=[];
    if(!isCBC){
      // Collect end term scores for each subject
      Object.keys(stored844).forEach(function(k){
        if(!k.startsWith(cls+'-'))return;
        var parts=k.split('-');var sub=parts[1];var exam=parts[2]||'';
        if(exam==='endterm'&&stored844[k][s.id]!==undefined){
          var total=null;
          var opK=cls+'-'+sub+'-opener';var catK=cls+'-'+sub+'-cat';
          var op=stored844[opK]&&stored844[opK][s.id]!==undefined?stored844[opK][s.id]:null;
          var cat=stored844[catK]&&stored844[catK][s.id]!==undefined?stored844[catK][s.id]:null;
          var et=stored844[k][s.id];
          if(op!==null&&cat!==null)total=Math.round(op*0.3+cat*0.3+et*0.4);
          if(total!==null){var g=getKcseGrade(total);scores.push(sub+': '+total+'% ('+g.grade+')');}
        }
      });
    }else{
      Object.keys(storedCBC).forEach(function(k){
        if(!k.startsWith(cls+'-'))return;
        var parts=k.split('-');var sub=parts[1];
        if(storedCBC[k][s.id]!==undefined){
          var lv=getCbcLevel(storedCBC[k][s.id]);
          scores.push(sub+': '+lv.level);
        }
      });
    }

    if(scores.length){
      var msg='Dear '+(s.parent||'Parent')+', term results for '+s.name+' ('+cln(cls)+'): '+scores.join(', ')+'. Contact school for full report. -- Jitihada Senior School, DARO360';
      notifs.push({id:Date.now()+count,student:s.name,parent:s.parent||'Parent',phone:s.phone||'07XXXXXXXX',message:msg,date:new Date().toLocaleDateString('en-KE'),cls:cls});
      count++;
    }
  });

  dbs('parent_notifs',notifs);
  toast('Results sent to '+count+' parents for '+cln(cls)+'.');
  rResultsOverview();
}

// =====================================================
// TIMETABLE GENERATOR ENGINE
// =====================================================
// KICD rules enforced:
//  - No teacher teaches two classes simultaneously
//  - Each subject gets correct weekly periods
//  - Double periods allowed for practicals (Sciences)
//  - Balanced distribution (no subject every morning)
//  - Core subjects (Maths, English, Kiswahili) in first 3 periods
//  - No more than 2 consecutive periods same subject
//  - Breaks and lunch fixed as per KICD schedule
// =====================================================

// Subject period requirements per week (KICD CBC Grade 10 + 8-4-4)
var SUBJ_PERIODS = {
  'English Language':4,'Literature in English':3,'Kiswahili':4,'Fasihi ya Kiswahili':2,
  'Mathematics':5,'Biology':4,'Chemistry':4,'Physics':4,
  'History & Government':3,'Geography':3,'CRE':2,'IRE':2,
  'Business Studies':3,'Economics':2,
  'Agriculture':3,'Computer Studies':3,'Home Science':3,
  'French':3,'German':2,'Arabic':2,
  'Physical Education':2,'Creative Arts':2
};

// Core subjects that should be in morning periods
var CORE_SUBJECTS = ['Mathematics','English Language','Kiswahili','Biology','Chemistry','Physics'];

// Subjects that may need double periods (consecutive)
var DOUBLE_PERIOD_SUBJ = ['Biology','Chemistry','Physics','Agriculture','Computer Studies','Home Science'];

var TTG_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

// Lesson periods only (excluding breaks/lunch)
var TTG_LESSON_IDS = ['p1','p2','p3','p4','p5','p6','p7','p8'];

// Period timing labels
var TTG_PERIOD_LABELS = {
  p1:'7:30-8:10', p2:'8:10-8:50', p3:'8:50-9:30',
  p4:'10:30-11:10', p5:'11:10-11:50', p6:'11:50-12:30',
  p7:'2:00-2:40', p8:'2:40-3:20'
};

// Morning periods (core subjects preferred here)
var MORNING_PERIODS = ['p1','p2','p3'];
var AFTERNOON_PERIODS = ['p4','p5','p6'];
var EVENING_PERIODS = ['p7','p8'];

// ── Get subject-teacher allocations for a class ────────────────
function getAllocations(cls){
  var result = [];
  Object.keys(STAFF).forEach(function(k){
    var s = STAFF[k];
    if(!s.classes || s.classes.indexOf(cls) === -1) return;
    if(!['teacher','hod','exams_hod'].includes(s.role)) return;
    s.subjects.forEach(function(sub){
      result.push({subject:sub, teacher:s.name, teacherKey:k});
    });
  });
  return result;
}

// ── Core generator algorithm ───────────────────────────────────
function generateTimetable(){
  var btn = document.getElementById('ttg-btn');
  var resultDiv = document.getElementById('ttg-result');
  var coreMode = document.getElementById('ttg-core') ? document.getElementById('ttg-core').value : 'morning';
  var allowDouble = document.getElementById('ttg-double') ? document.getElementById('ttg-double').value === 'yes' : true;
  var term = document.getElementById('ttg-term') ? document.getElementById('ttg-term').value : 'Term 2';
  var year = document.getElementById('ttg-year') ? document.getElementById('ttg-year').value : '2026';

  if(btn) btn.disabled = true;
  if(resultDiv) resultDiv.innerHTML = '<div class="card" style="margin-top:13px"><div style="display:flex;align-items:center;gap:10px"><span class="spinner" style="border-top-color:var(--gd);border-color:var(--bd);width:16px;height:16px;border-width:2px"></span><div><div style="font-weight:600;color:var(--gd)">Generating timetable...</div><div style="font-size:0.78rem;color:var(--mu)">Applying KICD rules and resolving conflicts...</div></div></div></div>';

  setTimeout(function(){
    try{
      var tt = runTTAlgorithm(coreMode, allowDouble, term, year);
      var violations = validateTT(tt);
      tt.generated = new Date().toLocaleDateString('en-KE');
      tt.term = term; tt.year = year;
      tt.violations = violations;
      dbs('school_timetable', tt);
      if(resultDiv) resultDiv.innerHTML = '';
      if(btn) btn.disabled = false;
      toast('Timetable generated! ' + (violations.length ? violations.length+' warnings.' : 'No conflicts.'));
      rTTGenerator();
    }catch(e){
      if(resultDiv) resultDiv.innerHTML = '<div class="card" style="margin-top:13px;border-left:3px solid var(--red)"><div style="color:var(--red);font-weight:600">Error: '+e.message+'</div></div>';
      if(btn) btn.disabled = false;
    }
  }, 200);
}

function runTTAlgorithm(coreMode, allowDouble, term, year){
  // Build master grid: {cls: {day: {pid: {subject, teacher, teacherKey}}}}
  var grid = {};
  ALL_CLASSES.forEach(function(cls){ grid[cls] = {}; TTG_DAYS.forEach(function(d){ grid[cls][d] = {}; }); });

  // teacher busy tracker: {teacherKey: {day: [pid, pid, ...]}}
  var teacherBusy = {};
  Object.keys(STAFF).forEach(function(k){ teacherBusy[k] = {}; TTG_DAYS.forEach(function(d){ teacherBusy[k][d] = []; }); });

  // Build lesson pool: [{cls, subject, teacher, teacherKey, periodsLeft, isCore, canDouble}]
  var pool = [];
  ALL_CLASSES.forEach(function(cls){
    var allocs = getAllocations(cls);
    allocs.forEach(function(a){
      var wkPeriods = SUBJ_PERIODS[a.subject] || 3;
      pool.push({
        cls: cls,
        subject: a.subject,
        teacher: a.teacher,
        teacherKey: a.teacherKey,
        periodsLeft: wkPeriods,
        isCore: CORE_SUBJECTS.indexOf(a.subject) > -1,
        canDouble: allowDouble && DOUBLE_PERIOD_SUBJ.indexOf(a.subject) > -1
      });
    });
  });

  // Sort: core subjects first, then by periodsLeft desc
  pool.sort(function(a,b){
    if(a.isCore && !b.isCore) return -1;
    if(!a.isCore && b.isCore) return 1;
    return b.periodsLeft - a.periodsLeft;
  });

  // Assign periods day by day, period by period
  // Use a balanced spread: distribute across days evenly
  TTG_DAYS.forEach(function(day){
    TTG_LESSON_IDS.forEach(function(pid){
      var isMorning = MORNING_PERIODS.indexOf(pid) > -1;

      ALL_CLASSES.forEach(function(cls){
        if(grid[cls][day][pid]) return; // already filled

        // Find best lesson for this slot
        var candidates = pool.filter(function(item){
          if(item.cls !== cls) return false;
          if(item.periodsLeft <= 0) return false;
          if(teacherBusy[item.teacherKey][day].indexOf(pid) > -1) return false;
          // Prefer core subjects in morning
          if(coreMode === 'morning' && isMorning && !item.isCore){
            var coreLeft = pool.filter(function(x){ return x.cls===cls&&x.isCore&&x.periodsLeft>0; });
            if(coreLeft.length > 0) return false;
          }
          // No more than 2 consecutive same subject
          var prev1 = getPrevPeriod(pid);
          var prev2 = prev1 ? getPrevPeriod(prev1) : null;
          if(prev1 && grid[cls][day][prev1] && grid[cls][day][prev1].subject === item.subject){
            if(prev2 && grid[cls][day][prev2] && grid[cls][day][prev2].subject === item.subject) return false;
          }
          // Same subject max once per day (unless double allowed)
          var alreadyToday = Object.keys(grid[cls][day]).filter(function(p){ return grid[cls][day][p] && grid[cls][day][p].subject === item.subject; }).length;
          if(alreadyToday >= (item.canDouble ? 2 : 1)) return false;
          return true;
        });

        if(candidates.length === 0) return;

        // Pick best candidate: prioritise core in morning, else most periods left
        candidates.sort(function(a,b){
          if(isMorning && a.isCore && !b.isCore) return -1;
          if(isMorning && !a.isCore && b.isCore) return 1;
          return b.periodsLeft - a.periodsLeft;
        });

        var chosen = candidates[0];
        grid[cls][day][pid] = {subject:chosen.subject, teacher:chosen.teacher, teacherKey:chosen.teacherKey};
        teacherBusy[chosen.teacherKey][day].push(pid);
        chosen.periodsLeft--;
      });
    });
  });

  return {grid:grid, pool:pool};
}

function getPrevPeriod(pid){
  var idx = TTG_LESSON_IDS.indexOf(pid);
  return idx > 0 ? TTG_LESSON_IDS[idx-1] : null;
}

// ── Validate generated timetable ──────────────────────────────
function validateTT(tt){
  var violations = [];
  var grid = tt.grid;

  // Check teacher clashes
  var teacherSlots = {};
  ALL_CLASSES.forEach(function(cls){
    TTG_DAYS.forEach(function(day){
      TTG_LESSON_IDS.forEach(function(pid){
        var slot = grid[cls][day][pid];
        if(!slot) return;
        var key = slot.teacherKey+'-'+day+'-'+pid;
        if(!teacherSlots[key]) teacherSlots[key] = [];
        teacherSlots[key].push(cls);
      });
    });
  });
  Object.keys(teacherSlots).forEach(function(k){
    if(teacherSlots[k].length > 1){
      var parts = k.split('-');
      var s = STAFF[parts[0]];
      violations.push({type:'clash', msg:(s?s.name:'Teacher')+' is double-booked on '+parts[1]+' '+parts[2]+' in '+teacherSlots[k].join(' & ')});
    }
  });

  // Check subject frequency (warn if any subject has 0 periods assigned)
  ALL_CLASSES.forEach(function(cls){
    var allocs = getAllocations(cls);
    allocs.forEach(function(a){
      var count = 0;
      TTG_DAYS.forEach(function(d){
        TTG_LESSON_IDS.forEach(function(p){
          if(grid[cls][d][p] && grid[cls][d][p].subject === a.subject) count++;
        });
      });
      if(count === 0) violations.push({type:'missing', msg:a.subject+' has no periods in '+cln(cls)});
    });
  });

  return violations;
}

// ── School timetable view ──────────────────────────────────────
function buildSchoolTTView(tt){
  var h = '';
  var violations = tt.violations || [];

  // Summary stats
  var totalSlots = 0; var filledSlots = 0;
  ALL_CLASSES.forEach(function(cls){
    TTG_DAYS.forEach(function(d){
      TTG_LESSON_IDS.forEach(function(p){
        totalSlots++;
        if(tt.grid[cls][d][p]) filledSlots++;
      });
    });
  });

  h += '<div class="g4" style="margin-bottom:14px">';
  h += '<div class="sc"><div class="sn">'+filledSlots+'</div><div class="sl">Slots filled</div></div>';
  h += '<div class="sc" style="border-left-color:var(--red)"><div class="sn">'+(totalSlots-filledSlots)+'</div><div class="sl">Slots empty</div></div>';
  h += '<div class="sc" style="border-left-color:'+(violations.length?'var(--red)':'var(--gl)')+'"><div class="sn">'+violations.length+'</div><div class="sl">'+(violations.length?'Conflicts':'No conflicts')+'</div></div>';
  h += '<div class="sc" style="border-left-color:var(--amb)"><div class="sn">'+tt.term+'</div><div class="sl">'+tt.year+'</div></div>';
  h += '</div>';

  // Violations
  if(violations.length){
    h += '<div class="alert-ban" style="margin-bottom:13px">';
    h += '<div style="font-weight:700;margin-bottom:5px">'+violations.length+' conflict(s) found</div>';
    violations.slice(0,5).forEach(function(v){
      h += '<div style="font-size:0.79rem;margin-bottom:2px">'+(v.type==='clash'?'Clash: ':'Missing: ')+v.msg+'</div>';
    });
    if(violations.length > 5) h += '<div style="font-size:0.77rem;color:var(--mu)">'+(violations.length-5)+' more...</div>';
    h += '</div>';
  }

  // Class selector tabs
  h += '<div class="tabs">';
  ALL_CLASSES.forEach(function(cls,i){
    h += '<div class="tab'+(i===0?' active':'')+'" onclick="swTTTab(\''+cls+'\')">'+cln(cls)+'</div>';
  });
  h += '</div>';

  // One grid per class
  ALL_CLASSES.forEach(function(cls,ci){
    h += '<div id="tt-cls-'+cls+'" class="tp'+(ci===0?' active':'')+'">';
    h += buildClassTTGrid(tt.grid[cls], cls);
    h += '</div>';
  });

  return h;
}

function swTTTab(cls){
  document.querySelectorAll('.tabs .tab').forEach(function(t,i){ t.classList.toggle('active',ALL_CLASSES[i]===cls); });
  ALL_CLASSES.forEach(function(c){ var el=document.getElementById('tt-cls-'+c); if(el)el.classList.toggle('active',c===cls); });
}

function buildClassTTGrid(clsGrid, cls){
  var isCBC = cls.startsWith('10');
  var h = '<div class="card" style="margin-bottom:11px">';
  h += '<div class="ct2">'+cln(cls)+' <span style="font-size:0.7rem;font-weight:400;color:var(--mu)">'+(isCBC?'CBC':'8-4-4')+'</span></div>';
  h += '<div class="tt-wrap"><div class="tt-grid" style="grid-template-columns:80px repeat(5,1fr)">';

  // Header
  h += '<div class="tt-cell tt-hdr">Period</div>';
  TTG_DAYS.forEach(function(d){ h += '<div class="tt-cell tt-hdr">'+d.slice(0,3)+'</div>'; });

  // Rows
  TT_PERIODS.forEach(function(p){
    if(p.type === 'break'){
      h += '<div class="tt-cell tt-time" style="font-size:0.62rem">'+p.label+'<div>'+p.time+'</div></div>';
      for(var i=0;i<5;i++) h += '<div class="tt-cell tt-break">'+p.label+'</div>';
      return;
    }
    h += '<div class="tt-cell tt-time">'+p.label+'<div style="font-size:0.58rem">'+p.time+'</div></div>';
    TTG_DAYS.forEach(function(d){
      var slot = clsGrid && clsGrid[d] && clsGrid[d][p.id];
      if(slot){
        var isCore = CORE_SUBJECTS.indexOf(slot.subject) > -1;
        h += '<div class="tt-cell tt-lesson" style="'+(isCore?'background:var(--gp)':'background:#f0f7ff')+'">';
        h += '<div class="tl-sub" style="font-size:0.7rem">'+slot.subject+'</div>';
        h += '<div class="tl-cls" style="font-size:0.6rem">'+slot.teacher.split(' ').slice(-1)[0]+'</div>';
        h += '</div>';
      } else {
        h += '<div class="tt-cell tt-empty">-</div>';
      }
    });
  });

  h += '</div></div>';

  // Subject summary table
  var subjCount = {};
  TTG_DAYS.forEach(function(d){
    TTG_LESSON_IDS.forEach(function(pid){
      var slot = clsGrid && clsGrid[d] && clsGrid[d][pid];
      if(slot){ subjCount[slot.subject] = (subjCount[slot.subject]||0) + 1; }
    });
  });
  h += '<div style="margin-top:11px"><div style="font-size:0.71rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px">Weekly period count</div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
  Object.keys(subjCount).sort().forEach(function(sub){
    var expected = SUBJ_PERIODS[sub] || 3;
    var actual = subjCount[sub];
    var ok = actual >= expected;
    h += '<span class="bdg '+(ok?'bg':'ba')+'">'+sub+': '+actual+'/'+(expected)+'</span>';
  });
  h += '</div></div></div>';
  return h;
}

// ── Push generated timetable to individual teacher stores ─────
function distributeTTToTeachers(){
  var tt = dbg('school_timetable');
  if(!tt || !tt.grid){ toast('No timetable generated yet.'); return; }

  var tts = dbg('timetables') || {};
  var grid = tt.grid;
  var count = 0;

  // Build per-teacher timetable
  Object.keys(STAFF).forEach(function(k){
    var s = STAFF[k];
    if(!['teacher','hod','exams_hod'].includes(s.role)) return;

    var myTT = {};
    TTG_DAYS.forEach(function(d){
      myTT[d] = {};
      ALL_CLASSES.forEach(function(cls){
        TTG_LESSON_IDS.forEach(function(pid){
          var slot = grid[cls][d] && grid[cls][d][pid];
          if(slot && slot.teacherKey === k){
            myTT[d][pid] = {subject:slot.subject, cls:cls};
          }
        });
      });
    });
    tts[k] = myTT;
    count++;
  });

  dbs('timetables', tts);
  toast('Timetable pushed to '+count+' teachers. Each teacher can now see their next lesson on their dashboard.');
}


function goPg(btn){go(btn.dataset.pg);}

function callAPI(prompt,onOk,onErr){
  fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})})
  .then(function(r){return r.json();})
  .then(function(data){if(data.error)onErr(data.error);else if(data.text)onOk(data.text);else onErr('No response.');})
  .catch(function(e){onErr(e.message);});
}

function prAI(id){
  var el=document.getElementById(id);if(!el)return;
  var w=window.open('','_blank');
  w.document.write('<html><head><title>DARO360 - Jitihada Senior School</title><style>body{font-family:monospace;font-size:12px;line-height:1.8;padding:20px;white-space:pre-wrap}</style></head><body>'+el.textContent+'</body></html>');
  w.document.close();w.print();
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function oSB(){document.getElementById('sb').classList.add('open');document.getElementById('ovl').classList.add('vis');}
function cSB(){document.getElementById('sb').classList.remove('open');document.getElementById('ovl').classList.remove('vis');}
