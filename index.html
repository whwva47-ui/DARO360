<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d4a2f">
<title>DARO360 - Jitihada Senior School</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gd:#0d4a2f;--gm:#155e3a;--gl:#1e7a4a;--gp:#e8f5ee;--gold:#c8952a;--goldf:#f0b429;--wh:#fff;--off:#f7faf8;--tx:#1a2e22;--mu:#5a7a65;--bd:#d0e4d8;--red:#c0392b;--rbg:#fdf2f2;--amb:#d97706;--abg:#fffbeb;--blu:#1d6fa4;--bbg:#eff6ff;--pur:#7c3aed;--pubg:#f5f3ff;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;color:var(--tx);background:var(--off);}
#ls{position:fixed;inset:0;z-index:1000;background:var(--gd);display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0;}
.lc{background:#fff;border-radius:16px;padding:36px;width:min(480px,95vw);box-shadow:0 24px 64px rgba(0,0,0,0.35);}
.ll{font-family:'Libre Baskerville',serif;font-size:1.8rem;font-weight:700;color:var(--gd);}
.ll span{color:var(--gold);}
.lsc{font-size:0.75rem;color:var(--mu);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.lschool{font-size:0.85rem;color:var(--gd);font-weight:700;margin-bottom:22px;}
.llb{font-size:0.7rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;display:block;}
.lsel{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:8px;font-family:inherit;font-size:0.9rem;color:var(--tx);background:var(--off);margin-bottom:13px;appearance:none;}
.lsel:focus{outline:none;border-color:var(--gl);}
.lbtn{width:100%;padding:12px;background:var(--gd);color:#fff;border:none;border-radius:8px;font-size:0.92rem;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;}
.lbtn:hover{background:var(--gm);}
.pr{display:none;gap:8px;margin-bottom:11px;}
.pr input{flex:1;padding:10px;text-align:center;font-size:1.1rem;font-weight:700;border:1px solid var(--bd);border-radius:8px;font-family:inherit;background:var(--off);color:var(--tx);}
.ph{font-size:0.72rem;color:var(--mu);margin-bottom:10px;display:none;}
#app{display:none;height:100vh;flex-direction:row;}
#app.vis{display:flex;}
.sb{width:230px;flex-shrink:0;background:var(--gd);display:flex;flex-direction:column;overflow-y:auto;border-right:3px solid var(--gold);}
.sbl{padding:16px 16px 12px;font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,0.1);}
.sbl span{color:var(--goldf);}
.sbsc{font-size:0.58rem;color:rgba(255,255,255,0.45);font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
.sbu{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:0.75rem;color:rgba(255,255,255,0.6);}
.sbu strong{display:block;color:#fff;font-size:0.82rem;}
.sbu em{font-style:normal;font-size:0.66rem;color:var(--goldf);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
.snv{flex:1;padding:8px 0;overflow-y:auto;}
.nsc{padding:6px 16px 3px;font-size:0.58rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.72);cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;}
.ni:hover{background:rgba(255,255,255,0.06);color:#fff;}
.ni.active{background:rgba(255,255,255,0.1);color:#fff;border-left-color:var(--goldf);}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:0.58rem;font-weight:700;padding:1px 5px;border-radius:9px;min-width:16px;text-align:center;}
.slo{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.78rem;color:rgba(255,255,255,0.4);cursor:pointer;}
.slo:hover{color:rgba(255,255,255,0.8);}
.mn{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.tb{padding:12px 20px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}
.tbt{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:700;color:var(--gd);}
.tbd{font-size:0.72rem;color:var(--mu);text-align:right;}
.ct{padding:20px;flex:1;}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;margin-bottom:18px;}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:13px;margin-bottom:18px;}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:18px;}
.g5{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:18px;}
.ct2{font-family:'Libre Baskerville',serif;font-size:0.92rem;font-weight:700;color:var(--gd);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sc{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:16px;border-left:4px solid var(--gl);}
.sn{font-family:'Libre Baskerville',serif;font-size:1.7rem;font-weight:700;color:var(--gd);line-height:1;}
.sl{font-size:0.68rem;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:0.7rem;font-weight:700;}
.bg{background:rgba(30,122,74,0.1);color:var(--gl);border:1px solid rgba(30,122,74,0.2);}
.ba{background:var(--abg);color:var(--amb);border:1px solid rgba(217,119,6,0.2);}
.br{background:var(--rbg);color:var(--red);border:1px solid rgba(192,57,43,0.2);}
.bb{background:var(--bbg);color:var(--blu);border:1px solid rgba(29,111,164,0.2);}
.bgr{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;}
.bgold{background:rgba(200,149,42,0.12);color:var(--gold);border:1px solid rgba(200,149,42,0.25);}
.bpur{background:var(--pubg);color:var(--pur);border:1px solid rgba(124,58,237,0.2);}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:11px;margin-bottom:11px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:0.68rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--mu);}
.fi,.fs,.ft{padding:8px 11px;border:1px solid var(--bd);border-radius:7px;font-family:inherit;font-size:0.86rem;color:var(--tx);background:var(--off);width:100%;}
.fs{appearance:none;}
.ft{resize:vertical;min-height:75px;}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--gl);box-shadow:0 0 0 3px rgba(30,122,74,0.1);}
.btn{padding:8px 18px;border-radius:7px;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.bp{background:var(--gd);color:#fff;}.bp:hover{background:var(--gm);}
.bs{background:transparent;color:var(--gd);border:1px solid var(--gd);}.bs:hover{background:var(--gp);}
.bd2{background:var(--red);color:#fff;}.bd2:hover{background:#a93226;}
.bgo{background:var(--gold);color:#fff;}.bgo:hover{background:var(--goldf);color:var(--gd);}
.bamb{background:var(--amb);color:#fff;}
.bblu{background:var(--blu);color:#fff;}
.bpur2{background:var(--pur);color:#fff;}
.bsm{padding:4px 11px;font-size:0.75rem;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.83rem;}
th{text-align:left;padding:8px 11px;font-size:0.68rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--mu);background:var(--off);border-bottom:2px solid var(--bd);}
td{padding:9px 11px;border-bottom:1px solid var(--bd);vertical-align:middle;}
tr:last-child td{border-bottom:none;}tr:hover td{background:var(--gp);}
.rs{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--bd);gap:10px;flex-wrap:wrap;}
.rs:last-child{border-bottom:none;}
.rn{font-weight:600;font-size:0.86rem;}
.ra2{font-size:0.72rem;color:var(--mu);}
.rac{display:flex;gap:5px;flex-wrap:wrap;}
.rb{padding:4px 10px;border-radius:5px;font-size:0.7rem;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.rbp{background:rgba(30,122,74,0.1);color:var(--gl);border-color:rgba(30,122,74,0.25);}
.rbp.on{background:var(--gl);color:#fff;border-color:var(--gl);}
.rba{background:var(--rbg);color:var(--red);border-color:rgba(192,57,43,0.2);}
.rba.on{background:var(--red);color:#fff;border-color:var(--red);}
.rbl{background:var(--abg);color:var(--amb);border-color:rgba(217,119,6,0.2);}
.rbl.on{background:var(--amb);color:#fff;border-color:var(--amb);}
.rec{padding:13px 15px;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:9px;border-left:4px solid var(--gl);}
.rec.ser{border-left-color:var(--red);}
.rec.mod{border-left-color:var(--amb);}
.rm{font-size:0.72rem;color:var(--mu);margin-bottom:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.rtx{font-size:0.86rem;color:var(--tx);line-height:1.55;}
.aio{background:var(--off);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-top:13px;display:none;}
.aio.vis{display:block;}
.aih{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--bd);}
.aih h4{font-family:'Libre Baskerville',serif;font-size:0.88rem;font-weight:700;color:var(--gd);}
.ait{font-size:0.8rem;line-height:1.8;white-space:pre-wrap;color:var(--tx);}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:18px;overflow-x:auto;}
.tab{padding:9px 15px;font-size:0.82rem;font-weight:600;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.active{color:var(--gd);border-bottom-color:var(--gd);}
.tp{display:none;}.tp.active{display:block;}
.duty-hdr{background:var(--gd);color:#fff;border-radius:var(--r);padding:16px 20px;margin-bottom:16px;}
.sh-btn{flex:1;padding:10px;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;border:2px solid var(--bd);background:#fff;color:var(--mu);transition:all 0.2s;text-align:center;}
.sh-btn.active{border-color:var(--gd);background:var(--gd);color:#fff;}
.pf-btn,.ar-btn{padding:4px 10px;border-radius:4px;font-size:0.7rem;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.pf-p{background:rgba(30,122,74,0.1);color:var(--gl);border-color:rgba(30,122,74,0.2);}
.pf-p.on{background:var(--gl);color:#fff;}
.pf-a{background:var(--rbg);color:var(--red);border-color:rgba(192,57,43,0.2);}
.pf-a.on{background:var(--red);color:#fff;}
.ar-c{background:rgba(30,122,74,0.1);color:var(--gl);border-color:rgba(30,122,74,0.2);}
.ar-c.on{background:var(--gl);color:#fff;}
.ar-n{background:var(--rbg);color:var(--red);border-color:rgba(192,57,43,0.2);}
.ar-n.on{background:var(--red);color:#fff;}
.msel-list{max-height:150px;overflow-y:auto;border:1px solid var(--bd);border-radius:7px;background:#fff;margin-top:4px;}
.msel-item{display:flex;align-items:center;gap:8px;padding:6px 11px;border-bottom:1px solid var(--bd);cursor:pointer;font-size:0.83rem;}
.msel-item:last-child{border-bottom:none;}
.msel-item:hover{background:var(--gp);}
.msel-item input{accent-color:var(--gl);width:13px;height:13px;flex-shrink:0;}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;min-height:28px;padding:5px;border:1px solid var(--bd);border-radius:7px;background:#fff;}
.ptag{display:inline-flex;align-items:center;gap:4px;background:var(--gp);color:var(--gl);border:1px solid rgba(30,122,74,0.2);padding:2px 9px;border-radius:20px;font-size:0.7rem;font-weight:600;}
.ptag-x{cursor:pointer;color:var(--mu);font-size:0.8rem;}
.ptag-x:hover{color:var(--red);}
.loc-edit{background:var(--off);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:12px;display:none;}
.loc-edit.vis{display:block;}
.dlg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.dlg-overlay.vis{display:flex;}
.dlg{background:#fff;border-radius:14px;padding:26px;width:min(460px,94vw);box-shadow:0 16px 48px rgba(0,0,0,0.25);max-height:90vh;overflow-y:auto;}
.dlg h3{font-family:'Libre Baskerville',serif;font-weight:700;color:var(--gd);margin-bottom:8px;font-size:0.98rem;}
.dlg p{font-size:0.86rem;color:var(--mu);line-height:1.65;margin-bottom:14px;white-space:pre-wrap;}
.dlg-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
.comm-msg{padding:10px 13px;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:7px;}
.comm-meta{font-size:0.7rem;color:var(--mu);margin-bottom:4px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.notif-item{padding:11px 14px;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;border-left:4px solid var(--amb);}
.notif-item.urgent{border-left-color:var(--red);}
.notif-item.info{border-left-color:var(--blu);}
.notif-item.success{border-left-color:var(--gl);}
.alert-banner{background:var(--rbg);border:1px solid rgba(192,57,43,0.25);border-radius:8px;padding:10px 13px;margin-bottom:13px;font-size:0.83rem;color:var(--red);}
.alert-banner.warn{background:var(--abg);border-color:rgba(217,119,6,0.25);color:var(--amb);}
.staff-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:13px;display:flex;flex-direction:column;gap:5px;}
.staff-name{font-weight:700;font-size:0.88rem;color:var(--gd);}
.staff-role{font-size:0.7rem;color:var(--mu);}
.tt-grid{border-collapse:collapse;width:100%;font-size:0.78rem;}
.tt-grid th{background:var(--gd);color:#fff;padding:7px 5px;text-align:center;font-size:0.68rem;font-weight:700;letter-spacing:0.05em;}
.tt-grid td{border:1px solid var(--bd);padding:5px 4px;text-align:center;vertical-align:middle;min-width:70px;}
.tt-grid .tt-period{background:var(--off);font-weight:700;font-size:0.7rem;color:var(--mu);white-space:nowrap;}
.tt-lesson{background:var(--gp);color:var(--gd);font-weight:600;font-size:0.72rem;border-radius:4px;padding:3px 5px;}
.tt-free{color:var(--mu);font-size:0.7rem;}
.tt-next{background:rgba(200,149,42,0.15);border:2px solid var(--gold);border-radius:4px;}
.grade-input{width:60px;padding:5px 7px;border:1px solid var(--bd);border-radius:5px;text-align:center;font-family:inherit;font-size:0.85rem;background:var(--off);}
.grade-input:focus{outline:none;border-color:var(--gl);}
.grade-A{background:#d4edda;color:#155724;font-weight:700;}
.grade-B{background:#d1ecf1;color:#0c5460;font-weight:700;}
.grade-C{background:#fff3cd;color:#856404;font-weight:700;}
.grade-D{background:#ffe8d0;color:#7d3c00;font-weight:700;}
.grade-E{background:var(--rbg);color:var(--red);font-weight:700;}
.grade-EE{background:#d4edda;color:#155724;font-weight:700;}
.grade-ME{background:#d1ecf1;color:#0c5460;font-weight:700;}
.grade-AE{background:#fff3cd;color:#856404;font-weight:700;}
.grade-BE{background:var(--rbg);color:var(--red);font-weight:700;}
.progress-bar{height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin-top:4px;}
.progress-fill{height:100%;background:var(--gl);border-radius:4px;transition:width 0.3s;}
.empty{text-align:center;padding:36px 18px;color:var(--mu);}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
.spinner-dark{border:2px solid rgba(13,74,47,0.2);border-top-color:var(--gd);}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--gd);color:#fff;padding:9px 18px;border-radius:8px;font-size:0.83rem;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity 0.3s;opacity:0;pointer-events:none;}
.toast.show{opacity:1;}
.hbg{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--gd);font-size:1.3rem;}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:190;}
.ovl.vis{display:block;}
@media(max-width:720px){.sb{position:fixed;left:-230px;top:0;bottom:0;z-index:200;transition:left 0.25s;height:100vh;}.sb.open{left:0;}.hbg{display:block;}.ct{padding:13px;}}
</style>
</head>
<body>
<div id="ls">
  <div class="lc">
    <div class="ll">DARO<span>360</span></div>
    <div class="lsc">School Management System</div>
    <div class="lschool">Jitihada Senior School</div>
    <label class="llb">Sign in as</label>
    <select class="lsel" id="lr" onchange="rcg()">
      <option value="">-- Select your role --</option>
      <optgroup label="School Leadership">
        <option value="principal">Principal - Mr. Kamau wa Njoroge</option>
        <option value="dp_ac">Deputy Principal (Academic) - Mrs. Wanjiku Njeri</option>
        <option value="dp_ad">Deputy Principal (Admin) - Mr. Oduya Otieno</option>
        <option value="senior">Senior Teacher - Mrs. Beatrice Achieng</option>
        <option value="boarding">Boarding Master - Mr. Joseph Kariuki</option>
      </optgroup>
      <optgroup label="Administration">
        <option value="secretary">Secretary - Ms. Faith Muthoni</option>
        <option value="accounts">Accountant - Mr. Peter Njuguna</option>
        <option value="exams_hod">Exams HOD - Mrs. Diana Ochieng</option>
      </optgroup>
      <optgroup label="Heads of Department">
        <option value="hod_lang">HOD Languages - Mrs. Sarah Atieno</option>
        <option value="hod_sci">HOD Sciences - Dr. John Karanja</option>
        <option value="hod_math">HOD Mathematics - Mrs. Grace Wanjiku</option>
        <option value="hod_hum">HOD Humanities - Mrs. Mary Akinyi</option>
        <option value="hod_tech">HOD Technical - Mr. Moses Gitau</option>
      </optgroup>
      <optgroup label="Teachers">
        <option value="tf">Felix Ochieng - English / Literature (Gr.10)</option>
        <option value="ta">Amina Hassan - Kiswahili / Fasihi (Gr.10)</option>
        <option value="tp">Peter Mwangi - French / English (F3&amp;4)</option>
        <option value="tj">James Mutua - Biology / Chemistry (F3&amp;4)</option>
        <option value="tr">Ruth Nekesa - Physics / Mathematics</option>
        <option value="td2">Diana Waweru - Chemistry / Biology</option>
        <option value="ts">Samuel Rotich - Mathematics / Physics</option>
        <option value="tl">Lydia Kamau - Mathematics / CS</option>
        <option value="tk">Kevin Odhiambo - History / CRE</option>
        <option value="tbe">Beatrice Njoroge - Geography / Business</option>
        <option value="tpa">Paul Simiyu - Business / Economics</option>
        <option value="tan">Ann Wangari - Agriculture / Biology</option>
        <option value="tch">Charles Kipchoge - CS / Mathematics</option>
        <option value="tjo">Joyce Adhiambo - Home Science / Biology</option>
        <option value="duty">Duty Teacher - On Duty Today</option>
      </optgroup>
      <optgroup label="Other">
        <option value="student">Learner - Anonymous Access</option>
      </optgroup>
    </select>
    <div class="pr" id="pr">
      <input type="password" maxlength="1" id="p1" placeholder="*" oninput="pn(this,'p2')">
      <input type="password" maxlength="1" id="p2" placeholder="*" oninput="pn(this,'p3')">
      <input type="password" maxlength="1" id="p3" placeholder="*" oninput="pn(this,'p4')">
      <input type="password" maxlength="1" id="p4" placeholder="*" oninput="pn(this,null)">
    </div>
    <div class="ph" id="ph">Demo PIN: 1 2 3 4</div>
    <button class="lbtn" onclick="doLogin()">Sign In</button>

function getKCSEGrade(score){
  for(var i=0;i<KCSE_GRADES.length;i++){
    if(score>=KCSE_GRADES[i].min&&score<=KCSE_GRADES[i].max)return KCSE_GRADES[i].grade;

}

  var o=parseFloat(opener)||0;var c=parseFloat(cat)||0;var e=parseFloat(endterm)||0;

}

function getSpecificReminders(){
  var r=[];
  var regs=dbg('regs')||{};var today=tdk();
  var allTeachers=['tf','ta','tp','tj','tr','td2','ts','tl','tk','tbe','tpa','tan','tch','tjo'];
  allTeachers.forEach(function(k){
    var s=STAFF[k];if(!s)return;
    s.classes.forEach(function(cls){
      if(!(regs[today]&&regs[today][cls]&&Object.keys(regs[today][cls]).length>0)){
        r.push({type:'urgent',person:s.name,task:'Register for '+cln(cls)+' not marked',action:'go:all-registers'});
      }
    });
  });
  var schemes=dbg('schemes_sub')||{};
  allTeachers.forEach(function(k){
    var s=STAFF[k];if(!s)return;
    if(!schemes[k]){
      r.push({type:'warn',person:s.name,task:'Scheme of work not submitted',action:'remind:'+s.name});
    }
  });
  return r;
}

function getNextLesson(tt){
  var days=['Monday','Tuesday','Wednesday','Thursday','Friday'];
  var now=new Date();var currentDay=now.getDay();
  if(currentDay===0||currentDay===6)return tt['Monday']?{day:'Monday',subject:Object.values(tt['Monday']||{})[0]||'--',class:'--',period:'P1 7:30'}:null;
  var dayName=days[currentDay-1];
  var dayTT=tt[dayName]||{};
  var entries=Object.entries(dayTT).filter(function(e){return e[1]&&e[1].subject;});
  if(entries.length)return{day:dayName,subject:entries[0][1].subject,class:entries[0][1].cls||'--',period:entries[0][0]};
  return null;
}

function loadAss844(){
  var cls=document.getElementById('ass844-cls').value;
  var sub=document.getElementById('ass844-sub').value;
  var term=document.getElementById('ass844-term').value;
  var sts=dbg('s'+cls)||[];
  var saved=dbg('assessment_844')||{};
  var key=CU.key+'_'+cls+'_'+sub+'_'+term;
  var existing=saved[key]||{};
  var h='<div class="tw"><table><tr><th>#</th><th>Student</th><th>Opener (30%)</th><th>CAT (30%)</th><th>End Term (40%)</th><th>Total</th><th>Grade</th></tr>';
  sts.forEach(function(s,i){
    var e=existing[s.id]||{};
    var total=e.opener&&e.cat&&e.endterm?calcTotal844(e.opener,e.cat,e.endterm):'';
    var grade=total!==''?getKCSEGrade(total):'';
    h+='<tr><td>'+(i+1)+'</td><td>'+s.name+'</td>';
    h+='<td><input type="number" class="grade-input" id="o-'+s.id+'" value="'+(e.opener||'')+'" min="0" max="100" oninput="calcRow844(\''+s.id+'\')"></td>';
    h+='<td><input type="number" class="grade-input" id="c-'+s.id+'" value="'+(e.cat||'')+'" min="0" max="100" oninput="calcRow844(\''+s.id+'\')"></td>';
    h+='<td><input type="number" class="grade-input" id="e-'+s.id+'" value="'+(e.endterm||'')+'" min="0" max="100" oninput="calcRow844(\''+s.id+'\')"></td>';
    h+='<td><span id="tot-'+s.id+'" style="font-weight:700">'+(total||'')+'</span></td>';
    h+='<td><span id="grd-'+s.id+'" class="bdg grade-'+grade+'">'+(grade||'')+'</span></td></tr>';
  });
  h+='</table></div>';
  document.getElementById('ass844-table').innerHTML=h;
  window._ass844_key=key;window._ass844_cls=cls;window._ass844_sts=sts;
}

function calcRow844(sid){
  var o=parseFloat(document.getElementById('o-'+sid)?.value)||0;
  var c=parseFloat(document.getElementById('c-'+sid)?.value)||0;
  var e=parseFloat(document.getElementById('e-'+sid)?.value)||0;
  var tot=Math.round(o*0.3+c*0.3+e*0.4);
  var grade=getKCSEGrade(tot);
  var totEl=document.getElementById('tot-'+sid);var grdEl=document.getElementById('grd-'+sid);
  if(totEl)totEl.textContent=tot;
  if(grdEl){grdEl.textContent=grade;grdEl.className='bdg grade-'+grade;}
}

  reader.onload=function(e){

    var prompt='This is a school teacher\'s timetable. Please extract all the information and return it as a JSON object in this exact format:\n{\n  "Monday": {"P1 7:30": {"subject": "English", "cls": "Grade 10 East"}, "P2 8:10": {...}, ...},\n  "Tuesday": {...},\n  ...\n}\nUse the period times as keys. If a period is free or break, omit it or set to null. Extract all days Monday to Friday. Return ONLY the JSON object, no other text.';

}

function renderTTGrid(tt){
  var h='<div class="tw"><table class="tt-grid"><tr><th>Period</th>';
  DAYS.forEach(function(d){h+='<th>'+d+'</th>';});h+='</tr>';
  var periods=['P1 7:30','P2 8:10','P3 8:50','Break 9:30','P4 10:00','P5 10:40','P6 11:20','Lunch 12:00','P7 13:00','P8 13:40'];
  var now=new Date();var dayIdx=now.getDay();var currentDay=dayIdx>0&&dayIdx<6?DAYS[dayIdx-1]:null;
  var currentHour=now.getHours();var currentMin=now.getMinutes();
  periods.forEach(function(p){
    var isBreak=p.startsWith('Break')||p.startsWith('Lunch');
    h+='<tr><td class="tt-period">'+p+'</td>';
    DAYS.forEach(function(d){
      if(isBreak){h+='<td class="tt-free" style="background:var(--off);font-size:0.7rem">'+p.split(' ')[0]+'</td>';return;}
      var lesson=tt[d]&&tt[d][p];
      if(lesson&&lesson.subject){
        var isNext=false;
        if(currentDay===d){var pTime=parseInt(p.split(' ')[1]);var pHr=Math.floor(pTime/100);var pMn=pTime%100;isNext=currentHour<pHr||(currentHour===pHr&&currentMin<pMn);}
        h+='<td'+(isNext?' class="tt-next"':'')+'>'+('<div class="tt-lesson">'+lesson.subject+(lesson.cls?'<br><span style="font-size:0.65rem;opacity:0.8">'+lesson.cls+'</span>':'')+'</div>')+'</td>';
      } else {h+='<td class="tt-free">—</td>';}
    });
    h+='</tr>';
  });
  h+='</table></div>';return h;
}

  var totalExp=Array.isArray(exp)?exp.reduce(function(a,e){return a+parseFloat(e.amount||0);},0):0;
  var balance=collFees-totalExp;
  var h='<div class="g4"><div class="sc"><div class="sn">KES '+Math.round(totalFees/1000)+'K</div><div class="sl">Total fees billed</div></div>';
  h+='<div class="sc" style="border-left-color:var(--gl)"><div class="sn">KES '+Math.round(collFees/1000)+'K</div><div class="sl">Fees collected</div></div>';
  h+='<div class="sc" style="border-left-color:var(--red)"><div class="sn">KES '+Math.round(totalExp/1000)+'K</div><div class="sl">Total expenditure</div></div>';
  h+='<div class="sc" style="border-left-color:var(--gold)"><div class="sn">KES '+Math.round(balance/1000)+'K</div><div class="sl">Balance</div></div></div>';
  h+='<div class="card"><div class="ct2">Budget overview</div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:6px"><span>Fee collection progress</span><span style="font-weight:700">'+Math.round(collFees/totalFees*100)+'%</span></div>';
  h+='<div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:'+Math.round(collFees/totalFees*100)+'%"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:6px"><span>Expenditure vs collected</span><span style="font-weight:700">'+Math.round(totalExp/collFees*100)+'%</span></div>';
  h+='<div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(100,Math.round(totalExp/collFees*100))+'%;background:var(--red)"></div></div>';
  h+='</div>';mc.innerHTML=h;
}

function rDeptTeachers(){var mc=document.getElementById('mc');var dept=DEPTS[CU.dept]||{members:[]};var regs=dbg('regs')||{};var today=tdk();var disc=dbg('disc')||[];var h='<div class="card"><div class="ct2">'+CU.dept+' Department</div>';dept.members.forEach(function(mk){var m=STAFF[mk];if(!m)return;var mT=m.classes.filter(function(c){return regs[today]&&regs[today][c]&&Object.keys(regs[today][c]).length>0;}).length;var myD=disc.filter(function(d){return d.teacher===m.name;}).length;h+='<div class="rec" style="margin-bottom:9px"><div class="rm"><span class="bdg bb">'+m.rank+'</span></div><div style="font-weight:700;font-size:0.9rem;color:var(--gd);margin-bottom:3px">'+m.name+'</div><div style="font-size:0.78rem;color:var(--mu);margin-bottom:6px">'+m.subjects.join(' / ')+' | Classes: '+m.classes.map(cln).join(', ')+'</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="bdg '+(mT===m.classes.length?'bg':'ba')+'">Registers: '+mT+'/'+m.classes.length+'</span><span class="bdg bgr">Discipline: '+myD+'</span><button class="btn bsm bs" onclick="sendTeacherReminder(\''+m.name+'\',\'Please update lesson notes for HOD review\')">Review lesson notes</button><button class="btn bsm bs" onclick="sendTeacherReminder(\''+m.name+'\',\'Scheme of work due for submission\')">Request scheme</button></div></div>';});h+='</div>';mc.innerHTML=h;}
function rDeptSchemes(){var mc=document.getElementById('mc');var submitted=dbg('schemes_sub')||{};var dept=DEPTS[CU.dept]||{members:[]};var h='<div class="card"><div class="ct2">'+CU.dept+' — Schemes Review</div><div class="tw"><table><tr><th>Teacher</th><th>Subjects</th><th>Submitted</th><th>Action</th></tr>';dept.members.forEach(function(mk){var s=STAFF[mk];if(!s)return;var has=submitted[mk];h+='<tr><td>'+s.name+'</td><td>'+s.subjects.join(', ')+'</td><td><span class="bdg '+(has?'bg':'br')+'">'+(has||'Not submitted')+'</span></td><td>'+(has?'<button class="btn bsm bp" onclick="markReviewed(\''+mk+'\')">Mark reviewed</button>':'<button class="btn bsm bs" onclick="sendTeacherReminder(\''+s.name+'\',\'Please submit your scheme of work this week.\')">Remind</button>')+'</td></tr>';});h+='</table></div></div>';mc.innerHTML=h;}
function markReviewed(k){var sub=dbg('schemes_sub')||{};sub[k]='reviewed';dbs('schemes_sub',sub);toast('Marked as reviewed.');rDeptSchemes();}
function rDeptAssessment(){var mc=document.getElementById('mc');var ass844=dbg('assessment_844')||{};var assCBC=dbg('assessment_cbc')||{};var dept=DEPTS[CU.dept]||{members:[]};var h='<div class="card"><div class="ct2">'+CU.dept+' — Assessment submission</div><div class="tw"><table><tr><th>Teacher</th><th>8-4-4</th><th>CBC</th></tr>';dept.members.forEach(function(mk){var s=STAFF[mk];if(!s)return;var has844=ass844[mk]&&ass844[mk].submitted;var hasCBC=assCBC[mk]&&assCBC[mk].submitted;h+='<tr><td>'+s.name+'</td><td><span class="bdg '+(has844?'bg':'br')+'">'+(has844||'Pending')+'</span></td><td><span class="bdg '+(hasCBC?'bg':'br')+'">'+(hasCBC||'Pending')+'</span></td></tr>';});h+='</table></div></div>';mc.innerHTML=h;}
function rDeptPerf(){var mc=document.getElementById('mc');var disc=dbg('disc')||[];var dept=DEPTS[CU.dept]||{members:[]};var regs=dbg('regs')||{};var today=tdk();var h='<div class="card"><div class="ct2">'+CU.dept+' Performance</div><div class="tw"><table><tr><th>Teacher</th><th>Classes</th><th>Registers</th><th>Discipline</th></tr>';dept.members.forEach(function(mk){var s=STAFF[mk];if(!s)return;var mT=s.classes.filter(function(c){return regs[today]&&regs[today][c]&&Object.keys(regs[today][c]).length>0;}).length;var myD=disc.filter(function(d){return d.teacher===s.name;}).length;h+='<tr><td>'+s.name+'</td><td>'+s.classes.map(cln).join(', ')+'</td><td><span class="bdg '+(mT===s.classes.length?'bg':'br')+'">'+mT+'/'+s.classes.length+'</span></td><td>'+myD+'</td></tr>';});h+='</table></div></div>';mc.innerHTML=h;}

function rCommunities(){
  var mc=document.getElementById('mc');var groups=[];
  if(CU.dept&&DEPTS[CU.dept])groups.push({id:'dept-'+CU.dept,name:CU.dept+' Department'});
  if(CU.classTeacher||['principal','dp_ac','dp_ad','senior'].includes(CU.role))groups.push({id:'class-teachers',name:'Class Teachers'});
  CU.subjects&&CU.subjects.forEach(function(sub){groups.push({id:'subj-'+sub.replace(/\W/g,'-'),name:sub+' Teachers'});});
  if(['principal','dp_ac','dp_ad','senior'].includes(CU.role)){groups.push({id:'all-staff',name:'All Staff'});groups.push({id:'all-hods',name:'HODs Council'});}
  if(CU.role==='hod')groups.push({id:'all-hods',name:'HODs Council'});
  if(['secretary','accounts','exams_hod','boarding'].includes(CU.role))groups.push({id:'admin-team',name:'Administration Team'});
  var msgs=dbg('comm_msgs')||{};
  var h='<div class="tabs" id="comm-tabs">';
  groups.forEach(function(g,i){h+='<div class="tab'+(i===0?' active':'')+'" onclick="swComm(\''+g.id+'\','+i+')">'+g.name+'</div>';});
  h+='</div>';
  groups.forEach(function(g,i){
    var gMsgs=(msgs[g.id]||[]);
    h+='<div class="tp'+(i===0?' active':'')+'" id="comm-'+g.id+'">';
    h+='<div class="card"><div style="font-size:0.84rem;color:var(--mu);margin-bottom:13px">'+g.name+' channel</div>';
    if(gMsgs.length){gMsgs.slice().reverse().slice(0,20).forEach(function(m){h+='<div class="comm-msg"><div class="comm-meta"><span class="bdg bb">'+m.from+'</span><span>'+m.time+'</span><span style="color:var(--mu)">'+m.date+'</span></div><div style="font-size:0.86rem">'+m.text+'</div></div>';});}
    else{h+='<div class="empty"><p>No messages yet. Start the conversation.</p></div>';}
    h+='<div style="border-top:1px solid var(--bd);padding-top:13px;margin-top:13px"><div class="fg" style="margin-bottom:8px"><label class="fl">Post a message</label><textarea class="ft" id="cmsg-'+g.id+'" placeholder="Share with '+g.name+'..." style="min-height:65px"></textarea></div><button class="btn bp" onclick="postMsg(\''+g.id+'\')">Post</button></div></div></div>';
  });
  if(!groups.length)h='<div class="empty"><p>No community groups for your role.</p></div>';
  mc.innerHTML=h;
}
function swComm(id,idx){document.querySelectorAll('.tabs .tab').forEach(function(t,i){t.classList.toggle('active',i===idx);});document.querySelectorAll('[id^="comm-"]').forEach(function(p){p.classList.remove('active');});var target=document.getElementById('comm-'+id);if(target)target.classList.add('active');}
function postMsg(gid){var inp=document.getElementById('cmsg-'+gid);if(!inp||!inp.value.trim())return;var msgs=dbg('comm_msgs')||{};if(!msgs[gid])msgs[gid]=[];msgs[gid].push({id:Date.now(),from:CU.name,role:CU.rank,text:inp.value.trim(),date:new Date().toLocaleDateString('en-KE'),time:nowTime()});dbs('comm_msgs',msgs);inp.value='';toast('Message posted.');rCommunities();}

function rSugg(){
  var mc=document.getElementById('mc');var isAdmin=['principal','dp_ac','dp_ad','senior','exams_hod','boarding'].includes(CU.role);var sugg=dbg('sugg')||[];var h='';
  if(!isAdmin){h+='<div class="card" style="margin-bottom:14px"><div class="ct2">Share your idea anonymously</div><div style="background:var(--gp);border:1px solid rgba(30,122,74,0.2);border-radius:8px;padding:11px 13px;margin-bottom:13px;font-size:0.83rem;color:var(--gl)">Your identity is completely hidden.</div><div class="fg" style="margin-bottom:11px"><label class="fl">Category</label><select class="fs" id="sgc"><option>School facilities</option><option>Teaching &amp; learning</option><option>School rules &amp; discipline</option><option>Activities &amp; clubs</option><option>Food &amp; dining</option><option>Safety &amp; security</option><option>Communication</option><option>Other</option></select></div><div class="fg" style="margin-bottom:13px"><label class="fl">Your suggestion</label><textarea class="ft" id="sgt2" style="min-height:90px" placeholder="Share your idea..."></textarea></div><button class="btn bgo" onclick="saveSugg()">Submit Anonymously</button></div>';}
  h+='<div class="card"><div class="ct2">'+(isAdmin?'All learner suggestions':'Recent suggestions')+' ('+sugg.length+')</div>';
  if(sugg.length){sugg.slice().reverse().forEach(function(s){h+='<div style="padding:12px 14px;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px"><div style="font-size:0.7rem;color:var(--mu);margin-bottom:5px">'+s.date+' / <span class="bdg bb">'+s.category+'</span></div><div style="font-size:0.86rem;font-style:italic">"'+s.text+'"</div></div>';});}
  else{h+='<div class="empty"><p>No suggestions yet.</p></div>';}
  h+='</div>';mc.innerHTML=h;
}
function saveSugg(){var cat=document.getElementById('sgc').value;var txt=document.getElementById('sgt2').value.trim();if(!txt){alert('Please write your suggestion.');return;}dbp('sugg',{id:Date.now(),date:new Date().toLocaleDateString('en-KE'),category:cat,text:txt});toast('Submitted anonymously. Thank you!');go('suggestions');}

function callAPI(prompt,onOk,onErr,image){
  var body={prompt:prompt};if(image)body.image=image;
  fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  .then(function(r){return r.json();})
  .then(function(data){if(data.error)onErr(data.error);else if(data.text)onOk(data.text);else onErr('No response.');})
  .catch(function(e){onErr(e.message);});
}
function cpAI(id){var el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.textContent).then(function(){toast('Copied!');});}
function prAI(id){var el=document.getElementById(id);if(!el)return;var w=window.open('','_blank');w.document.write('<html><head><title>DARO360</title><style>body{font-family:monospace;font-size:12px;line-height:1.8;padding:20px;white-space:pre-wrap}</style></head><body>'+el.textContent+'</body></html>');w.document.close();w.print();}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function oSB(){document.getElementById('sb').classList.add('open');document.getElementById('ovl').classList.add('vis');}
function cSB(){document.getElementById('sb').classList.remove('open');document.getElementById('ovl').classList.remove('vis');}
